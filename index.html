function PendingUploads({user,proyectoId,habs,onUploaded}){
  const[pending,setPending]=useState([]);
  const[uploading,setUploading]=useState(false);
  const[done,setDone]=useState(0);

  useEffect(()=>{
    const p=offlineStore.get().filter(r=>r.puesto===user.puesto_nombre);
    setPending(p);
  },[]);

  if(!pending.length)return null;

  const uploadAll=async()=>{
    setUploading(true);
    let count=0;
    for(const rec of pending){
      try{
        // Try to find vehiculo by patente
        let vehId=null,vehOk=false;
        if(rec.patente){
          const{data:v}=await db.sel("vehiculos",{f:[["patente","eq",rec.patente]],lim:1});
          if(v&&v[0]){vehId=v[0].id;vehOk=chkAuth("vehiculo",v[0].id,habs).ok;}
        }
        // Try to resolve personas by DNI
        const personasResolved=[];
        for(const dni of (rec.dnis||[])){
          const{data:p}=await db.sel("personas",{f:[["dni","eq",dni],["deleted_at","is","null"]],lim:1});
          const found=p&&p[0];
          const r=found?chkAuth("persona",found.id,habs):{ok:false,reason:"DNI no encontrado"};
          personasResolved.push({raw:dni,person:found||null,...r});
        }
        // Save as sesion if there's a vehicle, otherwise as movimientos manuales
        if(vehId||personasResolved.length>0){
          const{data:ses}=await db.ins("sesiones_acceso",{
            proyecto_id:proyectoId,puesto:rec.puesto,operador_id:user.id,
            vehiculo_id:vehId,vehiculo_ok:vehOk,direccion:rec.direccion,
            total_personas:personasResolved.length,
            total_aprobados:personasResolved.filter(p=>p.ok).length,
            total_rechazados:personasResolved.filter(p=>!p.ok).length,
            cerrada_at:rec.timestamp,
          });
          if(ses&&ses[0]&&personasResolved.length>0){
            await db.ins("registros_acceso",personasResolved.map((p,i)=>({
              sesion_id:ses[0].id,persona_id:p.person?p.person.id:null,dni_raw:p.raw,
              resultado:p.ok?"aprobado":"rechazado",motivo_rechazo:p.ok?null:p.reason,orden_escaneo:i+1,
            })));
          }
        }
        count++;
      }catch(e){console.error("Error subiendo registro offline:",e);}
    }
    offlineStore.clear();
    setDone(count);setUploading(false);setPending([]);
    onUploaded&&onUploaded();
  };

  return <div className="pending-bar">
    <div style={{flex:1}}>
      <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:800,color:"var(--acc)",textTransform:"uppercase"}}>
        {pending.length} registro{pending.length!==1?"s":""} pendiente{pending.length!==1?"s":""} de subir
      </div>
      <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>Guardados sin internet — ahora hay conexion</div>
    </div>
    {done>0&&<span style={{color:"var(--gr)",fontFamily:"var(--fm)",fontSize:13}}>{done} subidos!</span>}
    <button className="bsc" style={{padding:"8px 18px"}} disabled={uploading} onClick={uploadAll}>
      {uploading?"Subiendo...":"Subir ahora"}
    </button>
  </div>;
}

function Puesto({user,pid}){
  const[fase,setFase]=useState(F.V);
  const[dir,setDir]=useState("entrada");
  const[val,setVal]=useState("");
  const[veh,setVeh]=useState(null);
  const[pax,setPax]=useState([]);
  const[flash,setFlash]=useState(null);
  const[saving,setSaving]=useState(false);
  const[habs,setHabs]=useState([]);
  const[showManual,setShowManual]=useState(false);
  const[showOffline,setShowOffline]=useState(false);
  const[detalleSes,setDetalleSes]=useState(null);
  const[refreshKey,setRefreshKey]=useState(0);
  const[cola,setCola]=useState([]); // escaneadas pausadas
  const ref=useRef();
  const[paxSnap,setPaxSnap]=useState([]);
  const[warnDupVeh,setWarnDupVeh]=useState(null); // {patente, dir} si ya figura adentro

  const[offline,setOffline]=useState(false);

  useEffect(()=>{
    const loadHabs=async()=>{
      if(!isOnline()){
        // Sin internet: cargar desde cache
        const cached=cache.load();
        if(cached&&cached.habs){
          setHabs(cached.habs);
          setOffline(true);
          console.log("Modo offline: usando cache de",new Date(cached.ts).toLocaleString("es-AR"));
        }
        return;
      }
      // Con internet: cargar y guardar en cache
      const[{data:h},{data:p},{data:v}]=await Promise.all([
        db.sel("habilitaciones",{f:[["suspendida","eq",false]],lim:5000}),
        db.sel("personas",{f:[["deleted_at","is","null"]],lim:5000}),
        db.sel("vehiculos",{f:[["activo","eq",true]],lim:2000}),
      ]);
      if(h)setHabs(h);
      // Guardar todo en cache para uso offline
      if(h&&p&&v){
        cache.save({habs:h,personas:p,vehiculos:v,usuario:user,pid});
        setOffline(false);
      }
    };
    loadHabs();
  },[pid]);
  useEffect(()=>{setTimeout(()=>ref.current&&ref.current.focus(),80);},[fase,flash]);

  const sf=d=>{setFlash(d);setTimeout(()=>setFlash(null),2800);};

  const scanV=useCallback(async()=>{
    const v=val.trim().toUpperCase();if(!v)return;
    let found=null;let freshHabs=habs;
    if(!isOnline()){
      const cached=cache.load();
      if(cached){
        found=(cached.vehiculos||[]).find(x=>x.patente===v)||null;
        // Siempre leer habs del cache, no del estado (puede estar desactualizado)
        freshHabs=cached.habs||[];
        if(freshHabs.length===0)freshHabs=habs;
      }
      if(!found){
        found={id:null,patente:v,tipo:"Camioneta",descripcion:"No registrado (offline)",_noRegistrado:true};
        sf({ok:false,label:"VEHICULO NO REGISTRADO",sub:v,reason:"Sin habilitaciones — se registra la pasada igual"});
      }
      // Debug: log what we find
      const vehHabs=freshHabs.filter(h=>h.entity_type==="vehiculo"&&h.vehiculo_id===found.id);
      console.log("Offline vehicle habs found:", vehHabs.length, "for", found.id);
    } else {
      let vData=null,habsVeh=null,habsNew=null;
      // Buscar vehículo en cache primero
      const cachedNow=cache.load();
      if(cachedNow&&cachedNow.vehiculos){
        found=cachedNow.vehiculos.find(x=>x.patente===v)||null;
        freshHabs=cachedNow.habs||[];
      }
      // Si no está en cache o hay internet, consultar Supabase
      try{
        const[r1,r2,r3]=await Promise.all([
          db.sel("vehiculos",{f:[["patente","eq",v]],lim:1}),
          db.sel("habilitaciones",{f:[["entity_type","eq","vehiculo"]]}),
          db.sel("habilitaciones",{f:[["entity_type","eq","persona"]],lim:5000}),
        ]);
        if(r1.data&&r1.data[0])found=r1.data[0];
        habsVeh=r2.data;habsNew=r3.data;
      }catch(e){
        console.warn("scanV: fallo consulta Supabase, usando cache");
      }
      if(!found){
        sf({ok:false,label:"VEHICULO NO REGISTRADO",sub:v,reason:"No esta en la base — se registran solo las personas"});
        found={id:null,patente:v,tipo:"Camioneta",descripcion:"No registrado",_noRegistrado:true};
      }
      if(habsVeh||habsNew){
        freshHabs=[...(habsVeh||[]),...(habsNew||[])];
        setHabs(freshHabs);
      }
    }
    const r=found.id?chkAuth("vehiculo",found.id,freshHabs):{ok:false,reason:"Vehiculo no registrado"};
    setVeh({data:found,...r});setVal("");
    if(r.ok||found._noRegistrado)setFase(F.P);
  },[val,habs,user]);

  const scanP=useCallback(async()=>{
    const v=val.trim();if(!v)return;
    if(pax.some(p=>p.raw===v.toUpperCase())){sf({ok:false,label:"DNI REPETIDO",sub:v,reason:"Ya fue escaneado"});setVal("");return;}
    let found=null;
    // 1. Buscar SIEMPRE primero en cache local (rápido, sin depender de red)
    const cached=cache.load();
    if(cached&&cached.personas){
      found=(cached.personas||[]).find(x=>x.dni===v)||null;
    }
    // 2. Si no está en cache o hay internet, consultar Supabase
    if(!found&&isOnline()){
      try{
        const{data}=await db.sel("personas",{f:[["dni","eq",v],["deleted_at","is","null"]],lim:1});
        found=data&&data[0];
        // Si lo encontramos online, actualizar cache
        if(found&&cached){
          const idx=cached.personas.findIndex(p=>p.dni===v);
          if(idx>=0)cached.personas[idx]=found;else cached.personas.push(found);
          cache.save(cached);
        }
      }catch(e){
        console.warn("scanP: fallo consulta Supabase, usando solo cache");
      }
    }
    if(!found){
      setPax(p=>[...p,{raw:v.toUpperCase(),person:null,ok:false,reason:"DNI no encontrado",activeAuths:[]}]);
      sf({ok:false,label:"SIN REGISTRO",sub:v,reason:"DNI no encontrado"});
      setVal("");return;
    }
    const r=chkAuth("persona",found.id,habs);
    setPax(p=>[...p,{raw:found.dni,person:found,...r}]);
    sf({ok:r.ok,label:r.ok?"ACCESO PERMITIDO":"ACCESO DENEGADO",sub:`${found.nombre} ${found.apellido}`,detail:`DNI ${found.dni} · ${found.empresa||""}`,reason:r.ok?null:r.reason});
    setVal("");
  },[val,habs,pax,user]);

  const scan=()=>{if(fase===F.V)scanV();else if(fase===F.P)scanP();};
  const onKey=e=>{if(e.key==="Enter")scan();};

  const cerrar=async(dirFinal)=>{
    const d=dirFinal||dir;
    setSaving(true);
    setPaxSnap([...pax]); // guardar snapshot antes de cualquier reset
    if(!isOnline()){
      // Sin internet: guardar en offlineStore para subir despues
      offlineStore.add({
        puesto:user.puesto_nombre,

        patente:veh?veh.data.patente:null,
        vehiculo_id:veh?veh.data.id:null,

        timestamp:new Date().toISOString(),
      });
      setDir(d);setSaving(false);setFase(F.D);
      return;

      const{data:ses}=await db.ins("sesiones_acceso",{proyecto_id:pid,puesto:user.puesto_nombre,operador_id:user.id,vehiculo_id:veh.data.id||null,vehiculo_ok:veh.ok,vehiculo_razon:veh.data._noRegistrado?("No registrado: "+veh.data.patente):(veh.reason||null),direccion:d,total_personas:pax.length,total_aprobados:pax.filter(p=>p.ok).length,total_rechazados:pax.filter(p=>!p.ok).length});

      return true;
    };
    const withTimeout=(promise,ms)=>Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))]);
    try{
      await withTimeout(saveOnline(),8000);
    }catch(e){
      // Timeout o error de red: guardar offline
      console.warn("cerrar: fallo online, guardando offline:",e.message);

        puesto:user.puesto_nombre,operador_nombre:user.nombre,direccion:d,

          <div style={{color:"var(--tx2)",fontSize:13,marginBottom:20}}>Según los registros de hoy ya figuran adentro. Se registrarán salidas automáticas para corregir el conteo y luego se registra la nueva entrada.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button className="bp" style={{background:"rgba(245,158,11,.2)",border:"2px solid var(--acc)",color:"var(--acc)"}} onClick={async()=>{
              const d=warnDupVeh.dirFinal;

              if(warnDupVeh.dupVeh&&veh&&veh.data.id){

              }
              // Corregir personas si hace falta
              for(const nombre of(warnDupVeh.dupPax||[])){
                const p=pax.find(x=>x.person&&`${x.person.nombre} ${x.person.apellido}`===nombre);
                if(p&&p.person){
                  await db.ins("movimientos_manuales",{proyecto_id:pid,puesto:user.puesto_nombre,operador_id:user.id,persona_id:p.person.id,dni_raw:p.raw,nombre_raw:nombre,direccion:"salida"});
                }
              }
              setWarnDupVeh(null);

          </div>
        </div>
      </div>
    </div></div>}
    {showManual&&<MovimientoManual user={user} proyectoId={pid} onClose={()=>setShowManual(false)} onSaved={()=>setRefreshKey(k=>k+1)}/>}
    {showOffline&&<OfflineModePanel user={user} proyectoId={pid} onClose={()=>setShowOffline(false)}/>}
    {detalleSes&&<SesionDetalle ses={detalleSes} onClose={()=>setDetalleSes(null)}/>}
  </div>;
}

// ─── TABLERO PÚBLICO ──────────────────────────────────────────────────────────
function PublicDashboard({onBack}){
  const[tab,setTab]=useState("chalet");
  const[search,setSearch]=useState("");
  const[searchResult,setSearchResult]=useState(null);
  const[searching,setSearching]=useState(false);
  const[habs,setHabs]=useState([]);
  const[movHoy,setMovHoy]=useState([]);
  const[movVehs,setMovVehs]=useState({});
  const[movPersonas,setMovPersonas]=useState({});
  const[movRegs,setMovRegs]=useState({});
  const[movLoading,setMovLoading]=useState(true);
  const[pubChalet,setPubChalet]=useState({persChalet:null,persCamino:0,vehChalet:0,vehCamino:0,persListChalet:[],persListCamino:[],vehListChalet:[],vehListCamino:[]});
  const[pubShowList,setPubShowList]=useState(null);

  const loadChalet=async()=>{
    const[net2,net3,vNet2,vNet3]=await Promise.all([
      calcNet("Puesto 2"),calcNet("Puesto 3"),
      calcNetVehiculos("Puesto 2"),calcNetVehiculos("Puesto 3"),
    ]);
    const persIdsChalet=Object.entries(net3).filter(([_,v])=>v>0).map(([k])=>k);
    // En camino: neto positivo en P2, y neto en P3 <= 0 (no llegaron al chalet aun)
    const persIdsCamino=Object.entries(net2).filter(([k,v])=>{
      const enP3=net3[k]||0;
      return v>0&&enP3<=0;
    }).map(([k])=>k);
    const vehIdsChalet=Object.entries(vNet3).filter(([_,v])=>v>0).map(([k])=>k);
    const vehIdsCamino=Object.entries(vNet2).filter(([k,v])=>{const enP3=vNet3[k]||0;return v>0&&enP3<=0;}).map(([k])=>k);
    const allPersIds=[...persIdsChalet,...persIdsCamino].filter(k=>k&&k.length===36);
    const allVehIds=[...vehIdsChalet,...vehIdsCamino];
    const[{data:pers},{data:vehs}]=await Promise.all([
      allPersIds.length?db.sel("personas",{cols:"id,nombre,apellido,empresa,dni"}):{data:[]},
      allVehIds.length?db.sel("vehiculos",{cols:"id,patente,descripcion,tipo,empresa"}):{data:[]},
    ]);
    setPubChalet({
      persChalet:persIdsChalet.length,
      persCamino:persIdsCamino.length,
      vehChalet:vehIdsChalet.length,
      vehCamino:vehIdsCamino.length,
      persListChalet:(pers||[]).filter(p=>persIdsChalet.includes(p.id)),
      persListCamino:(pers||[]).filter(p=>persIdsCamino.includes(p.id)),
      vehListChalet:(vehs||[]).filter(v=>vehIdsChalet.includes(v.id)),
      vehListCamino:(vehs||[]).filter(v=>vehIdsCamino.includes(v.id)),
    });
  };


  useEffect(()=>{
    db.sel("habilitaciones",{f:[["suspendida","eq",false]],lim:5000}).then(({data})=>{if(data)setHabs(data);});
    loadMovimientos();
    loadChalet();
    const i=setInterval(()=>{loadMovimientos();loadChalet();},15000);
    return()=>clearInterval(i);
  },[]);

  const loadMovimientos=async()=>{
    setMovLoading(true);
    const[{data:ses},{data:man}]=await Promise.all([
      db.sel("sesiones_acceso",{f:[["cerrada_at","gte",today()+"T00:00:00"]],ord:"cerrada_at.desc",lim:100}),
      db.sel("movimientos_manuales",{f:[["created_at","gte",today()+"T00:00:00"]],ord:"created_at.desc",lim:50}),
    ]);
    setMovHoy({ses:ses||[],man:man||[]});
    if(ses&&ses.length){
      const vids=[...new Set((ses||[]).filter(s=>s.vehiculo_id).map(s=>s.vehiculo_id))];
      const sesIds=(ses||[]).map(s=>s.id);
      const[{data:vehs},{data:regs}]=await Promise.all([
        vids.length?db.sel("vehiculos",{cols:"id,patente,tipo"}):{data:[]},
        db.sel("registros_acceso",{cols:"sesion_id,persona_id,dni_raw,resultado",inFilter:["sesion_id",sesIds]}),
      ]);
      const vm={};(vehs||[]).forEach(v=>{vm[v.id]=v;});setMovVehs(vm);
      const rm={};(regs||[]).filter(r=>sesIds.includes(r.sesion_id)).forEach(r=>{if(!rm[r.sesion_id])rm[r.sesion_id]=[];rm[r.sesion_id].push(r);});setMovRegs(rm);
      const pids=[...new Set((regs||[]).filter(r=>r.persona_id).map(r=>r.persona_id))];
      if(pids.length){const{data:p}=await db.sel("personas",{cols:"id,nombre,apellido"});const pm={};(p||[]).forEach(x=>{pm[x.id]=x;});setMovPersonas(pm);}
    }
    setMovLoading(false);
  };

  const buscar=async()=>{
    if(!search.trim())return;
    setSearching(true);setSearchResult(null);
    const q=search.trim();
    // Intentar como DNI
    const{data:p}=await db.sel("personas",{f:[["dni","eq",q],["deleted_at","is","null"]],lim:1});
    const habOk=(pid,tipo)=>habs.some(h=>h.entity_type==="persona"&&h.persona_id===pid&&h.tipo===tipo&&!h.suspendida&&(!h.fecha_hasta||(h.fecha_hasta+"").slice(0,10)>=today()));
    if(p&&p[0]){
      const shOk=habOk(p[0].id,"sh_ingreso");
      const cpOk=habOk(p[0].id,"cp_ingreso");
      setSearchResult({type:"persona",data:p[0],shOk,cpOk,estado:shOk&&cpOk?"ok":shOk||cpOk?"par":"no"});
      setSearching(false);return;
    }
    // Intentar como nombre
    const{data:p2}=await db.sel("personas",{f:[["deleted_at","is","null"]],ord:"apellido.asc"});
    const found=(p2||[]).filter(x=>`${x.nombre} ${x.apellido}`.toLowerCase().includes(q.toLowerCase()));
    if(found.length===1){
      const shOk=habOk(found[0].id,"sh_ingreso");
      const cpOk=habOk(found[0].id,"cp_ingreso");
      setSearchResult({type:"persona",data:found[0],shOk,cpOk,estado:shOk&&cpOk?"ok":shOk||cpOk?"par":"no"});
    } else if(found.length>1){
      setSearchResult({type:"multiple",items:found});
    } else {
      // Intentar como patente
      const{data:v}=await db.sel("vehiculos",{f:[["patente","eq",q.toUpperCase()],["activo","eq",true]],lim:1});
      if(v&&v[0]){
        // Buscar habs del vehiculo directo en Supabase, no del cache
        const{data:vhabs}=await db.sel("habilitaciones",{f:[["entity_type","eq","vehiculo"],["vehiculo_id","eq",v[0].id]]});
        const habVOk=(tipo)=>(vhabs||[]).some(h=>h.tipo===tipo&&!h.suspendida&&(!h.fecha_hasta||(h.fecha_hasta+"").slice(0,10)>=today()));
        const shOk=habVOk("sh_ingreso");
        const chaletOk=habVOk("sh_manejo");
        setSearchResult({type:"vehiculo",data:v[0],shOk,chaletOk});
      } else {
        setSearchResult({type:"nada"});
      }
    }
    setSearching(false);
  };

  const getPaxStr=(sesId,max=3)=>{
    const ok=(movRegs[sesId]||[]).filter(r=>r.resultado==="aprobado");
    if(!ok.length)return"sin pasajeros";
    const names=ok.map(r=>{const p=movPersonas[r.persona_id];return p?`${p.nombre} ${p.apellido}`:r.dni_raw;});
    if(names.length<=max)return names.join(", ");
    return names.slice(0,max).join(", ")+"...";
  };

  const sesList=movHoy.ses||[];

            const shIng=habCheck("sh_ingreso");const shCha=habCheck("sh_chalet");const shMan=habCheck("sh_manejo");

          {searchResult.type==="vehiculo"&&(()=>{
            const chaletOk=searchResult.chaletOk||false;
            return <div style={{background:"var(--s1)",border:"1px solid var(--bd)",borderRadius:8,padding:"20px 24px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
                <span style={{fontSize:36}}>{VI[searchResult.data.tipo]||"🚗"}</span>
                <div style={{flex:1}}><div style={{fontFamily:"var(--fm)",fontSize:22,fontWeight:600}}>{searchResult.data.patente}</div><div style={{fontSize:13,color:"var(--tx2)"}}>{searchResult.data.descripcion} · {searchResult.data.empresa}</div></div>

                <div style={{padding:"8px 14px",background:"var(--s2)",borderRadius:4,fontSize:13}}><span style={{color:"var(--tx2)"}}>S&H Ingreso: </span><span style={{color:searchResult.shOk?"var(--gr)":"var(--rd)",fontWeight:600}}>{searchResult.shOk?"Habilitado":"No habilitado"}</span></div>

    </div>
  </div>;
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin,onPublic}){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const go=async()=>{
    setLoading(true);setErr("");
    if(!isOnline()){
      // Sin internet: intentar login desde cache
      const cached=cache.load();
      if(cached&&cached.usuario&&cached.usuario.email===email){
        onLogin(cached.usuario);setLoading(false);return;
      }
      setErr("Sin internet y sin cache previo. Conectate al menos una vez primero.");
      setLoading(false);return;
    }
    const r=await authApi.signIn(email,pw);
    if(r.error){setErr(r.error);setLoading(false);return;}
    const{data}=await db.sel("usuarios",{f:[["id","eq",r.userId]],lim:1});
    if(!data||!data[0]){setErr("Usuario sin perfil. Contacta al administrador.");await authApi.signOut();setLoading(false);return;}
    onLogin(data[0]);setLoading(false);
  };
  return <div className="lwrap"><div className="lcard">
    <div className="llogo">CONTROL<span>OBRA</span></div>
    <div className="lsub">Sistema de control de puestos</div>
    {err&&<div className="err">{err}</div>}
    <div className="f"><label>Email</label><input type="email" placeholder="usuario@obrasysistemas.com.ar" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/></div>
    <div className="f"><label>Contrasena</label><input type="password" placeholder="..." value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
    <button className="bp" onClick={go} disabled={loading}>{loading?"Ingresando...":"Ingresar"}</button>
    <button className="lpub" onClick={onPublic}>Ver movimientos de obra (sin login)</button>
  </div></div>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState(null);
  const[proyectos,setProyectos]=useState([]);
  const[checking,setChecking]=useState(true);
  const[publicMode,setPublicMode]=useState(false);
  const pid=proyectos.length>0?proyectos[0].id:null;

  useEffect(()=>{
    const uid=restoreSes();
    if(uid){
      // Intentar cargar usuario directamente, si falla por 401 el dbq lo refresca solo
      const timeout=setTimeout(()=>setChecking(false),8000); // max 8s
      db.sel("usuarios",{f:[["id","eq",uid]],lim:1}).then(({data})=>{
        clearTimeout(timeout);
        if(data&&data[0])login(data[0]);
        else setChecking(false);
      }).catch(()=>{clearTimeout(timeout);setChecking(false);});
    }
    else setChecking(false);
  },[]);

  const login=async p=>{
    setUser(p);
    setTab({puesto:"sc",sh:"per",cp:"per",admin:"per",logistica:"per"}[p.rol]||"per");
    const{data}=await db.sel("proyectos",{f:[["activo","eq",true]]});
    if(data)setProyectos(data);
    setChecking(false);
  };
  const logout=async()=>{await authApi.signOut();setUser(null);setTab(null);setProyectos([]);};

  const TABS={
    puesto:   [{k:"sc",l:"Escanear"},{k:"per",l:"Personal"},{k:"veh",l:"Vehiculos"},{k:"reg",l:"Registros"}],
    sh:       [{k:"per",l:"Personal"},{k:"veh",l:"Vehiculos"},{k:"reg",l:"Registros"}],
    cp:       [{k:"per",l:"Personal"},{k:"reg",l:"Registros"}],
    logistica:[{k:"per",l:"Personal"},{k:"veh",l:"Vehiculos"},{k:"reg",l:"Registros"}],
    admin:    [{k:"per",l:"Personal"},{k:"veh",l:"Vehiculos"},{k:"sc",l:"Puestos"},{k:"reg",l:"Registros"},{k:"adm",l:"Usuarios"}],
  };

  if(checking)return <div className="lwrap"><Spin t="Iniciando..."/></div>;
  if(publicMode)return <PublicDashboard onBack={()=>setPublicMode(false)}/>;
  if(!user)return <Login onLogin={login} onPublic={()=>setPublicMode(true)}/>;
  const tabs=TABS[user.rol]||[];
  return <div className="app">
    <div className="topbar">
      <div className="brand">CONTROL<span>OBRA</span></div>
      <div className="tr" style={{gap:8,flexWrap:"nowrap"}}>
        <span style={{fontSize:12,color:"var(--tx2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:80}}>{user.nombre}</span>
        <span className="rol" style={{flexShrink:0}}>{user.rol==="puesto"?user.puesto_nombre||"Puesto":user.rol.toUpperCase()}</span>
        <button className="btn-out" onClick={logout} style={{flexShrink:0}}>Salir</button>
      </div>
    </div>
    {pid&&<div style={{background:"var(--s2)",borderBottom:"1px solid var(--bd)",padding:"5px 12px",display:"flex",alignItems:"center",gap:8,overflowX:"auto"}}><ChaletMini proyectoId={pid}/></div>}
    {tabs.length>1&&<div className="nav">{tabs.map(t=><button key={t.k} className={`nb${tab===t.k?" on":""}`} onClick={()=>setTab(t.k)}>{t.l}</button>)}</div>}
    <div className="main">
      {tab==="per"&&<PersonalPanel userRole={user.rol} currentUserId={user.id} proyectoId={pid} user={user}/>}
      {tab==="veh"&&<VehiculosPanel userRole={user.rol} currentUserId={user.id} proyectoId={pid}/>}
      {tab==="reg"&&<Registros defaultPuesto={user.rol==="puesto"?user.puesto_nombre:""}/>}
      {tab==="sc" &&<Puesto user={user} pid={pid}/>}
      {tab==="adm"&&<Usuarios currentUser={user}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
