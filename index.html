<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ControlObra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0C0E14;--s1:#141720;--s2:#1C2030;--bd:#2A2F42;--acc:#F59E0B;--acc2:#3B82F6;--tx:#E8EAF0;--tx2:#8892A4;--gr:#10B981;--rd:#EF4444;--pu:#8B5CF6;--fh:'Barlow Condensed',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Barlow',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--s1);border-bottom:2px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:.05em}.brand span{color:var(--acc)}
.tr{display:flex;align-items:center;gap:10px}
.rol{background:var(--s2);border:1px solid var(--bd);padding:3px 10px;border-radius:4px;font-size:11px;font-family:var(--fm);color:var(--acc);text-transform:uppercase}
.btn-out{background:none;border:1px solid var(--bd);color:var(--tx2);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:13px}.btn-out:hover{border-color:var(--rd);color:var(--rd)}
.nav{background:var(--s2);border-bottom:1px solid var(--bd);display:flex;padding:0 20px;overflow-x:auto;gap:2px}
.nb{background:none;border:none;color:var(--tx2);padding:11px 18px;cursor:pointer;font-family:var(--fh);font-size:14px;letter-spacing:.05em;font-weight:600;text-transform:uppercase;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}.nb:hover{color:var(--tx)}.nb.on{color:var(--acc);border-bottom-color:var(--acc)}
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
/* LOGIN */
.lwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--bd) 39px,var(--bd) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,var(--bd) 39px,var(--bd) 40px);background-size:40px 40px}
.lcard{background:var(--s1);border:2px solid var(--bd);border-radius:8px;padding:40px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.llogo{font-family:var(--fh);font-size:36px;font-weight:800;letter-spacing:.05em;margin-bottom:4px}.llogo span{color:var(--acc)}
.lsub{color:var(--tx2);font-size:13px;font-family:var(--fm);letter-spacing:.05em;margin-bottom:28px;text-transform:uppercase}
.lpub{width:100%;background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:4px;padding:11px;font-family:var(--fh);font-size:15px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .15s}.lpub:hover{border-color:var(--pu);color:#A78BFA}
/* FORMS */
.f{margin-bottom:14px}.f label{display:block;font-size:11px;font-family:var(--fm);color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:9px 13px;color:var(--tx);font-size:14px;font-family:var(--fb);transition:border-color .15s;outline:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--acc)}.f input::placeholder{color:var(--tx2);opacity:.4}.f textarea{resize:vertical;min-height:70px}.f select{cursor:pointer;background:var(--s2)}
.bp{width:100%;background:var(--acc);color:#000;border:none;border-radius:4px;padding:12px;font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}.bp:hover{filter:brightness(1.1)}.bp:disabled{opacity:.35;cursor:not-allowed;filter:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--rd);padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px}
.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:var(--acc);padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:12px}
.row2{display:flex;gap:12px}.row2 .f{flex:1}
.badd{background:var(--acc);color:#000;border:none;border-radius:4px;padding:8px 18px;font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}.badd:hover{filter:brightness(1.1)}
.bsm{border:1px solid var(--bd);background:var(--s2);color:var(--tx2);border-radius:3px;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .15s}.bsm:hover{border-color:var(--acc2);color:var(--acc2)}.bsm-r:hover{border-color:var(--rd)!important;color:var(--rd)!important}
.bcanc{background:var(--s2);color:var(--tx2);border:1px solid var(--bd);border-radius:4px;padding:12px 20px;font-family:var(--fh);font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}.bcanc:hover{border-color:var(--tx2)}
/* TABLE */
.ph2{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.ptit{font-family:var(--fh);font-size:28px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.ptit span{color:var(--acc)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:14px 16px}
.sc-btn{cursor:pointer;transition:all .15s}.sc-btn:hover{border-color:var(--acc2);background:rgba(59,130,246,.05)}
.sv{font-family:var(--fh);font-size:34px;font-weight:800;line-height:1}.slb{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;font-family:var(--fm)}
.fb{display:flex;gap:10px;margin-bottom:13px;flex-wrap:wrap}
.fi{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:8px 13px;color:var(--tx);font-size:13px;outline:none;transition:border-color .15s}.fi:focus{border-color:var(--acc2)}.fi::placeholder{color:var(--tx2);opacity:.45}
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:8px;overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px)}
table{width:100%;border-collapse:collapse;min-width:700px}
th{background:var(--s2);padding:8px 12px;text-align:left;font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:10}
th.sh-h{color:#60A5FA;border-left:2px solid rgba(59,130,246,.25)}th.cp-h{color:var(--gr);border-left:2px solid rgba(16,185,129,.25)}
td{padding:9px 12px;border-bottom:1px solid rgba(42,47,66,.5);font-size:13px;vertical-align:middle}
td.sh-c{border-left:2px solid rgba(59,130,246,.1)}td.cp-c{border-left:2px solid rgba(16,185,129,.1)}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.012)}
.mn{font-family:var(--fm);font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-family:var(--fm);text-transform:uppercase;letter-spacing:.05em;border:1px solid}
.t-a{background:rgba(16,185,129,.1);color:var(--gr);border-color:rgba(16,185,129,.3)}.t-e{background:rgba(245,158,11,.1);color:var(--acc);border-color:rgba(245,158,11,.3)}.t-v{background:rgba(139,92,246,.1);color:#A78BFA;border-color:rgba(139,92,246,.3)}.t-p{background:rgba(59,130,246,.1);color:#60A5FA;border-color:rgba(59,130,246,.3)}
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:700;background:var(--s2);border:1px solid var(--bd);color:var(--tx2);flex-shrink:0}
/* HAB CELL */
.hc{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:600;border:1px solid;white-space:nowrap;transition:all .15s}
.hc-ok{background:rgba(16,185,129,.1);color:var(--gr);border-color:rgba(16,185,129,.3)}.hc-exp{background:rgba(245,158,11,.1);color:var(--acc);border-color:rgba(245,158,11,.3)}.hc-sus{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.3)}
.hc-edit{cursor:pointer}.hc-edit:hover{filter:brightness(1.25)}
.hc-add{background:none;border:1px dashed var(--bd);color:var(--tx2);border-radius:4px;padding:3px 8px;font-size:11px;font-family:var(--fm);cursor:pointer;transition:all .15s}.hc-add:hover{border-color:var(--acc);color:var(--acc)}
.est-ok{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.3);border-radius:4px;padding:3px 10px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase}
.est-no{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.3);border-radius:4px;padding:3px 10px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase}
.est-par{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,.08);color:var(--acc);border:1px solid rgba(245,158,11,.25);border-radius:4px;padding:3px 10px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.md{background:var(--s1);border:1px solid var(--bd);border-radius:8px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.md-lg{max-width:680px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--bd)}
.mt{font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.mc{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1}.mc:hover{color:var(--rd)}
.mb{padding:22px 24px}.mf{display:flex;gap:10px;padding:0 24px 22px}.mf .bp{flex:1}
/* LOADER */
.load{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--tx2);font-family:var(--fm);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* CHALET BAR */
.chalet-bar{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(59,130,246,.1));border:1px solid rgba(139,92,246,.35);border-radius:8px;padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.chalet-num{font-family:var(--fh);font-size:52px;font-weight:900;color:#A78BFA;line-height:1}
.chalet-label{font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#A78BFA}
.chalet-sub{font-size:12px;color:var(--tx2);font-family:var(--fm);margin-top:3px}
.chalet-btn{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.4);color:#A78BFA;border-radius:5px;padding:7px 16px;font-family:var(--fh);font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-left:auto}.chalet-btn:hover{background:rgba(139,92,246,.25)}
/* PUESTO STEPS */
.steps{display:flex;margin-bottom:18px}
.step{display:flex;align-items:center;gap:8px;padding:10px 18px;font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tx2);border-bottom:3px solid var(--bd);flex:1;transition:all .2s}
.sn{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.step.on{color:var(--acc);border-bottom-color:var(--acc)}.step.on .sn{background:var(--acc);border-color:var(--acc);color:#000}
.step.dn{color:var(--gr);border-bottom-color:var(--gr)}.step.dn .sn{background:var(--gr);border-color:var(--gr);color:#000}
.vc{background:var(--s1);border:2px solid var(--bd);border-radius:8px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.vc.ok{border-color:rgba(16,185,129,.45);background:rgba(16,185,129,.04)}.vc.no{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.04)}
.vp{font-family:var(--fm);font-size:26px;font-weight:600;letter-spacing:.1em}.vd{font-size:13px;color:var(--tx2);margin-top:2px}
.vs{margin-left:auto;text-align:right}.vsl{font-family:var(--fh);font-size:22px;font-weight:800;text-transform:uppercase}.vsl.ok{color:var(--gr)}.vsl.no{color:var(--rd)}
.sbox{background:var(--s1);border:2px solid var(--bd);border-radius:8px;padding:18px 22px;margin-bottom:14px}
.slbl{font-family:var(--fh);font-size:12px;letter-spacing:.1em;color:var(--tx2);text-transform:uppercase;margin-bottom:10px}
.srow{display:flex;gap:10px}
.sinp{flex:1;background:var(--bg);border:2px solid var(--acc);border-radius:4px;padding:13px 16px;color:var(--tx);font-size:22px;font-family:var(--fm);letter-spacing:.08em;outline:none;text-transform:uppercase}.sinp::placeholder{color:var(--tx2);opacity:.3;font-size:15px}.sinp:focus{box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.bsc{background:var(--acc);color:#000;border:none;border-radius:4px;padding:0 22px;font-family:var(--fh);font-size:16px;font-weight:700;text-transform:uppercase;cursor:pointer}.bsc:hover{filter:brightness(1.1)}
.sh-hint{font-size:12px;color:var(--tx2);margin-top:7px;font-family:var(--fm)}
.fl{padding:13px 18px;border-radius:6px;margin-bottom:12px;animation:fi .15s ease}
.fl-ok{background:rgba(16,185,129,.1);border:2px solid var(--gr)}.fl-no{background:rgba(239,68,68,.1);border:2px solid var(--rd)}
.fll{font-family:var(--fh);font-size:22px;font-weight:800}.fl-ok .fll{color:var(--gr)}.fl-no .fll{color:var(--rd)}
@keyframes fi{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.pi{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:5px;margin-bottom:5px;border:1px solid transparent}
.pi.ok{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.22)}.pi.no{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.22)}
.pd{width:9px;height:9px;border-radius:50%;flex-shrink:0}.pd.ok{background:var(--gr)}.pd.no{background:var(--rd)}
.bcl{width:100%;background:var(--s2);border:2px solid var(--gr);color:var(--gr);border-radius:6px;padding:13px;font-family:var(--fh);font-size:17px;font-weight:700;text-transform:uppercase;cursor:pointer;margin-top:14px}.bcl:hover{background:rgba(16,185,129,.14)}.bcl:disabled{opacity:.35;cursor:not-allowed}
.bnew{width:100%;background:var(--acc);color:#000;border:none;border-radius:6px;padding:14px;font-family:var(--fh);font-size:18px;font-weight:700;text-transform:uppercase;cursor:pointer;margin-top:10px}.bnew:hover{filter:brightness(1.1)}
.scard{background:var(--s1);border:2px solid var(--bd);border-radius:8px;padding:20px 24px;margin-bottom:14px}
.stit{font-family:var(--fh);font-size:20px;font-weight:800;text-transform:uppercase;margin-bottom:14px;color:var(--acc)}
.dtog{display:flex;gap:8px;margin-bottom:14px}
.db{flex:1;background:var(--s2);border:2px solid var(--bd);border-radius:4px;padding:10px;color:var(--tx2);font-family:var(--fh);font-size:16px;font-weight:700;text-transform:uppercase;cursor:pointer}
.db-in.on{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#60A5FA}.db-out.on{background:rgba(245,158,11,.1);border-color:var(--acc);color:var(--acc)}
.rt{font-family:var(--fh);font-size:12px;letter-spacing:.1em;color:var(--tx2);text-transform:uppercase;margin-bottom:8px;margin-top:22px}
.sr{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--s1);border:1px solid var(--bd);border-radius:4px;margin-bottom:5px;font-size:13px;cursor:pointer;transition:all .15s}.sr:hover{border-color:var(--acc2)}
.ld{font-family:var(--fm);font-size:11px;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.ld-in{background:rgba(59,130,246,.15);color:#60A5FA;border:1px solid rgba(59,130,246,.3)}.ld-out{background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.btn-manual{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);border-radius:5px;padding:9px 16px;font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;width:100%;margin-top:8px}.btn-manual:hover{border-color:var(--acc);color:var(--acc)}
.dir-big{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.dir-big-btn{background:var(--s2);border:2px solid var(--bd);border-radius:6px;padding:18px;font-family:var(--fh);font-size:22px;font-weight:800;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center}
.dir-big-btn.in:hover{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#60A5FA}
.dir-big-btn.out:hover{background:rgba(245,158,11,.1);border-color:var(--acc);color:var(--acc)}
/* PUBLIC DASHBOARD */
.pub-wrap{min-height:100vh;background:var(--bg)}
.pub-bar{background:var(--s1);border-bottom:2px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.pub-tabs{display:flex;gap:2px;padding:0 20px;background:var(--s2);border-bottom:1px solid var(--bd);overflow-x:auto}
.pub-tab{background:none;border:none;color:var(--tx2);padding:11px 18px;cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:600;text-transform:uppercase;border-bottom:3px solid transparent;white-space:nowrap}.pub-tab:hover{color:var(--tx)}.pub-tab.on{color:var(--pu);border-bottom-color:var(--pu)}
.pub-main{padding:24px;max-width:1100px;margin:0 auto}
.pub-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:#A78BFA;border-radius:4px;padding:3px 10px;font-family:var(--fm);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.pub-dot{width:7px;height:7px;border-radius:50%;background:#A78BFA;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* CHECKBOX LIST */
.cbl{max-height:320px;overflow-y:auto;border:1px solid var(--bd);border-radius:4px}
.cbl-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid rgba(42,47,66,.5);cursor:pointer;transition:background .1s}
.cbl-item:last-child{border-bottom:none}.cbl-item:hover{background:var(--s2)}
.cbl-item input[type=checkbox]{width:auto;cursor:pointer;accent-color:var(--acc)}
.offline-bar{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(245,158,11,.1));border:2px solid rgba(239,68,68,.5);border-radius:8px;padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.offline-title{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--rd);text-transform:uppercase;letter-spacing:.05em}
.btn-offline{background:rgba(239,68,68,.15);border:2px solid var(--rd);color:var(--rd);border-radius:5px;padding:8px 18px;font-family:var(--fh);font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:all .15s;width:100%;margin-top:8px}
.btn-offline:hover{background:rgba(239,68,68,.25)}
.pending-bar{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.4);border-radius:8px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

@media(max-width:600px){
  button{min-height:40px}
  .bsc,.bcl,.bnew,.badd,.bp,.bcanc{min-height:44px;font-size:14px}
  .btn-out{min-height:36px}
  .bsm{min-height:34px;padding:6px 12px}
  .top{padding:6px 10px;gap:6px}
  .tr{gap:6px;flex-wrap:wrap;justify-content:flex-end}

const db={
  sel:async(table,{cols="*",f=[],ord=null,lim=null,inFilter=null}={})=>{
    let u=`${table}?select=${encodeURIComponent(cols)}`;
    f.forEach(([k,op,v])=>{u+=`&${k}=${op}.${encodeURIComponent(v)}`;});
    if(inFilter){u+=`&${inFilter[0]}=in.(${inFilter[1].join(",")})`;}
    if(ord)u+=`&order=${ord}`;if(lim)u+=`&limit=${lim}`;
    const{data,ok}=await dbq(u,{h:{"Accept":"application/json"}});
    return{data:ok?(Array.isArray(data)?data:[data]):null};
  },
  ins:async(table,payload,upsert=false,onConflict=null)=>{
    const body=Array.isArray(payload)?payload:[payload];
    const prefer=upsert?"resolution=merge-duplicates,return=representation":"return=representation";
    let path=table;
    if(upsert&&onConflict)path+=`?on_conflict=${onConflict}`;
    const{data,ok}=await dbq(path,{method:"POST",h:{"Prefer":prefer},body:JSON.stringify(body)});
    return{data:ok?(Array.isArray(data)?data:[data]):null,ok};
  },
  upd:async(table,payload,filters)=>{
    let u=`${table}?`;filters.forEach(([k,op,v])=>{u+=`&${k}=${op}.${encodeURIComponent(v)}`;});
    const{data,ok}=await dbq(u,{method:"PATCH",h:{"Prefer":"return=representation"},body:JSON.stringify(payload)});
    if(!ok)console.error("db.upd failed",table,payload,data);
    return{data,ok};
  },
  rpc:async(fn,params)=>{
    const{data,ok}=await dbq(`rpc/${fn}`,{method:"POST",h:{},body:JSON.stringify(params)});
    return{data,ok};
  },
  del:async(table,filters)=>{
    let u=`${table}?`;filters.forEach(([k,op,v])=>{u+=`&${k}=${op}.${encodeURIComponent(v)}`;});
    await dbq(u,{method:"DELETE"});
  },

        </div>

          }
        </div>)}</div>
      }
    </div>
  </div></div>;
}

// helper: calcula neto de personas en un puesto dado datos de sesiones+manuales+regs
// calcNet: neto de personas por puesto (clave = persona_id o dni_raw)
const calcNet=async(puesto)=>{
  const todayStr=today();
  const[{data:ses},{data:man}]=await Promise.all([
    db.sel("sesiones_acceso",{f:[["puesto","eq",puesto],["cerrada_at","gte",todayStr+"T00:00:00"]],ord:"cerrada_at.asc"}),
    db.sel("movimientos_manuales",{f:[["puesto","eq",puesto],["created_at","gte",todayStr+"T00:00:00"]],ord:"created_at.asc"}),
  ]);
  const sesIds=(ses||[]).map(s=>s.id);
  let regPersonas=[];
  if(sesIds.length>0){
    // Filtramos por sesion_id directamente en Supabase (no hay limite de filas)
    const{data:regs}=await db.sel("registros_acceso",{cols:"persona_id,dni_raw,sesion_id",inFilter:["sesion_id",sesIds]});
    regPersonas=regs||[];
  }
  // Normalizar claves: preferir persona_id pero si no hay, usar dni_raw
  // Construir mapa dni_raw -> persona_id para normalizar
  const dniToId={};
  regPersonas.forEach(r=>{if(r.persona_id&&r.dni_raw)dniToId[r.dni_raw]=r.persona_id;});
  const normKey=(pid,dni)=>pid||(dniToId[dni]||dni);

  const netMap={};
  (ses||[]).forEach(s=>{
    const delta=s.direccion==="entrada"?1:-1;
    regPersonas.filter(r=>r.sesion_id===s.id).forEach(r=>{
      const key=normKey(r.persona_id,r.dni_raw);
      netMap[key]=(netMap[key]||0)+delta;
    });
  });
  (man||[]).forEach(m=>{
    const delta=m.direccion==="entrada"?1:-1;
    const key=normKey(m.persona_id,m.dni_raw)||("m_"+m.id);
    netMap[key]=(netMap[key]||0)+delta;
  });
  return netMap;
};

// calcNetVehiculos: neto de vehiculos por puesto (clave = vehiculo_id)
const calcNetVehiculos=async(puesto)=>{
  const todayStr=today();
  const{data:ses}=await db.sel("sesiones_acceso",{
    cols:"vehiculo_id,direccion,cerrada_at,vehiculo_razon",
    f:[["puesto","eq",puesto],["cerrada_at","gte",todayStr+"T00:00:00"]],
    ord:"cerrada_at.asc"
  });
  const netMap={};
  (ses||[]).forEach(s=>{
    // Usar vehiculo_id si existe, sino usar el texto del vehiculo_razon como clave
    const key=s.vehiculo_id||(s.vehiculo_razon&&s.vehiculo_razon.startsWith("No registrado:")?s.vehiculo_razon:null);
    if(!key)return;
    netMap[key]=(netMap[key]||0)+(s.direccion==="entrada"?1:-1);
  });
  return netMap;
};

function HabCell({hab:habInit,tipo,entityType,entityId,proyectoId,canEdit,currentUserId,onRefresh,onHabSaved,tdClass}){
  const[show,setShow]=useState(false);
  const[hab,setHab]=useState(habInit);
  const[saving,setSaving]=useState(false);
  const savedRef=React.useRef(false);

  useEffect(()=>{
    if(!savedRef.current)setHab(habInit);
  },[habInit?.id, habInit?.fecha_hasta, habInit?.suspendida]);

  const st=habSt(hab);

  const save=async(form)=>{
    setSaving(true);
    try{
      const{data,ok}=await db.rpc("set_habilitacion",{
        p_entity_type:entityType,
        p_persona_id:entityType==="persona"?entityId:null,
        p_vehiculo_id:entityType==="vehiculo"?entityId:null,
        p_tipo:tipo,
        p_proyecto_id:proyectoId,
        p_otorgado_por:currentUserId,
        p_fecha_hasta:form.fecha_hasta,
        p_suspendida:form.suspendida||false,
        p_motivo:form.motivo_suspension||null
      });
      if(!ok){alert("Error: "+JSON.stringify(data));setSaving(false);return;}
      const saved=typeof data==="object"&&data!==null?data:{...form,tipo,entity_type:entityType};
      savedRef.current=true;
      setHab(saved);
      setShow(false);
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  const remove=async()=>{
    if(!confirm("Eliminar esta habilitacion?"))return;
    const delF=entityType==="persona"
      ?[["persona_id","eq",entityId],["tipo","eq",tipo],["proyecto_id","eq",proyectoId]]
      :[["vehiculo_id","eq",entityId],["tipo","eq",tipo],["proyecto_id","eq",proyectoId]];
    await db.del("habilitaciones",delF);
    savedRef.current=true;
    setHab(null);setShow(false);
  };

  return <td className={tdClass||""} style={{minWidth:88}}>
    {st==="none"
      ?canEdit?<button className="hc-add" onClick={()=>setShow(true)}>+ Agregar</button>:<span style={{color:"var(--tx2)",opacity:.3,fontSize:12}}>—</span>
      :<span className={`hc hc-${st}${canEdit?" hc-edit":""}`} onClick={canEdit?()=>setShow(true):undefined}>
        {st==="ok"?"ok "+fmtD(hab.fecha_hasta):st==="exp"?"VENC "+fmtD(hab.fecha_hasta):"SUSP"}
      </span>
    }
    {show&&<HabModal hab={hab} tipo={tipo} saving={saving} onClose={()=>setShow(false)} onSave={save} onDelete={hab?remove:null}/>}
  </td>;
}


// ─── HABILITACION MASIVA POR EMPRESA ──────────────────────────────────────────
function HabMasivaModal({proyectoId,currentUserId,habs,onClose,onSaved}){
  const[empresas,setEmpresas]=useState([]);
  const[empresa,setEmpresa]=useState("");
  const[personas,setPersonas]=useState([]);
  const[selected,setSelected]=useState({});
  const[tipo,setTipo]=useState("sh_ingreso");
  const[fecha,setFecha]=useState("");
  const[saving,setSaving]=useState(false);
  const[step,setStep]=useState("empresa"); // empresa | personas | fecha

  useEffect(()=>{
    db.sel("personas",{cols:"empresa",f:[["deleted_at","is","null"]]}).then(({data})=>{
      if(data){
        const emp=[...new Set(data.map(p=>p.empresa).filter(Boolean))].sort();
        setEmpresas(emp);
      }
    });
  },[]);

  const loadPersonas=async(emp)=>{
    const{data}=await db.sel("personas",{f:[["empresa","eq",emp],["deleted_at","is","null"]],ord:"apellido.asc"});
    if(data){
      setPersonas(data);
      const sel={};
      data.forEach(p=>{sel[p.id]=true;});
      setSelected(sel);
    }
  };

  const toggleAll=()=>{
    const allOn=personas.every(p=>selected[p.id]);
    const sel={};
    personas.forEach(p=>{sel[p.id]=!allOn;});
    setSelected(sel);
  };

  const save=async()=>{
    const ids=Object.entries(selected).filter(([_,v])=>v).map(([k])=>k);
    if(!ids.length||!fecha)return;
    setSaving(true);
    const tipos=tipo==="todas"?TODOS_TIPOS:[tipo];
    for(const pid of ids){
      for(const t of tipos){
        // DELETE+INSERT para evitar duplicados
        await db.del("habilitaciones",[["persona_id","eq",pid],["tipo","eq",t],["proyecto_id","eq",proyectoId]]);
        await db.ins("habilitaciones",{entity_type:"persona",persona_id:pid,tipo:t,proyecto_id:proyectoId,otorgado_por:currentUserId,fecha_desde:today(),fecha_hasta:fecha,suspendida:false});
      }
    }
    setSaving(false);onSaved();onClose();
  };

  const TODOS_TIPOS=["sh_ingreso","sh_chalet","sh_manejo","cp_ingreso","cp_almuerzo","cp_cena"];
  const tiposLabel={"todas":"⭐ TODAS las habilitaciones","sh_ingreso":"S&H Ingreso","sh_chalet":"S&H Subir a Chalet","sh_manejo":"S&H Manejo en Montana","cp_ingreso":"CP Ingreso","cp_almuerzo":"CP Almuerzo","cp_cena":"CP Cena"};
  const selectedCount=Object.values(selected).filter(Boolean).length;

  return <div className="mo"><div className="md md-lg">
    <div className="mh"><div className="mt">Habilitacion masiva por empresa</div><button className="mc" onClick={onClose}>x</button></div>
    <div className="mb">
      {step==="empresa"&&<>
        <div className="f"><label>Tipo de habilitacion</label>
          <select value={tipo} onChange={e=>setTipo(e.target.value)}>
            {Object.entries(tiposLabel).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div className="f"><label>Empresa</label>
          {empresas.length===0
            ?<div style={{color:"var(--tx2)",fontSize:13,padding:"8px 0"}}>Cargando empresas...</div>
            :<select value={empresa} onChange={e=>{setEmpresa(e.target.value);if(e.target.value)loadPersonas(e.target.value);}}>
              <option value="">-- seleccionar empresa --</option>
              {empresas.map(e=><option key={e} value={e}>{e}</option>)}
            </select>
          }
        </div>
        {empresa&&personas.length===0&&<div style={{color:"var(--tx2)",fontSize:13}}>Cargando personal...</div>}
        {empresa&&personas.length>0&&<button className="bp" onClick={()=>setStep("personas")}>Ver {personas.length} personas de {empresa} →</button>}
      </>}
      {step==="personas"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontWeight:600}}>{empresa}</div>
            <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>{tiposLabel[tipo]} — vence {fmtD(fecha)}</div>
          </div>
          <button className="bsm" onClick={toggleAll}>{personas.every(p=>selected[p.id])?"Quitar todos":"Seleccionar todos"}</button>
        </div>
        <div className="cbl">
          {personas.map(p=>{
            const st=habSt(getHab("persona",p.id,tipo,habs));
            return <div key={p.id} className="cbl-item" onClick={()=>setSelected(s=>({...s,[p.id]:!s[p.id]}))}>
              <input type="checkbox" checked={!!selected[p.id]} readOnly/>
              <div className="av">{ini(`${p.nombre} ${p.apellido}`)}</div>
              <div style={{flex:1}}><div style={{fontWeight:500}}>{p.nombre} {p.apellido}</div><div style={{fontSize:11,color:"var(--tx2)"}}>DNI {p.dni}</div></div>
              {st!=="none"&&<span className={`hc hc-${st}`} style={{fontSize:10}}>{st==="ok"?"actual":st==="exp"?"venc":"susp"}</span>}
            </div>;
          })}
        </div>
        <div style={{marginTop:12,fontSize:13,color:"var(--tx2)"}}>{selectedCount} personas seleccionadas</div>
        <div style={{marginTop:16}}><button className="bp" disabled={selectedCount===0} onClick={()=>setStep("fecha")}>Continuar → elegir fecha</button></div>
      </>}
      {step==="fecha"&&<>
        <div style={{marginBottom:14}}>
          <div style={{fontWeight:600}}>{empresa}</div>
          <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>{tiposLabel[tipo]} · {selectedCount} personas</div>
        </div>
        <div className="f"><label>Fecha de vencimiento</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} autoFocus/></div>
      </>}
    </div>
    <div className="mf">
      {step==="personas"&&<button className="bcanc" onClick={()=>setStep("empresa")}>Atras</button>}
      {step==="fecha"&&<button className="bcanc" onClick={()=>setStep("personas")}>Atras</button>}
      <button className="bcanc" onClick={onClose}>Cancelar</button>
      {step==="fecha"&&<button className="bp" disabled={saving||!fecha} onClick={save}>{saving?"Aplicando...":"Aplicar a "+selectedCount+" personas"}</button>}
    </div>
  </div></div>;
}

// ─── HABILITAR TODO MODAL ────────────────────────────────────────────────────
function HabTodoModal({proyectoId,currentUserId,tipo,onClose,onSaved}){
  const[fecha,setFecha]=useState("2027-01-01");
  const[saving,setSaving]=useState(false);
  const[prog,setProg]=useState(null); // {done, total}
  const TODOS_TIPOS_P=["sh_ingreso","sh_chalet","sh_manejo","cp_ingreso","cp_almuerzo","cp_cena"];
  const TODOS_TIPOS_V=["sh_ingreso","sh_manejo"];

  const save=async()=>{
    if(!fecha)return;
    setSaving(true);
    const tipos=tipo==="persona"?TODOS_TIPOS_P:TODOS_TIPOS_V;
    // Fetch all entities
    const{data:entities}=tipo==="persona"
      ?await db.sel("personas",{cols:"id",f:[["deleted_at","is","null"]],lim:5000})
      :await db.sel("vehiculos",{cols:"id",f:[["activo","eq",true]],lim:2000});
    const{data:habsExist}=await db.sel("habilitaciones",{f:[["entity_type","eq",tipo==="persona"?"persona":"vehiculo"]],lim:10000});
    const habMap={};
    (habsExist||[]).forEach(h=>{
      const eid=tipo==="persona"?h.persona_id:h.vehiculo_id;
      habMap[`${eid}_${h.tipo}`]=h.id;
    });
    const total=(entities||[]).length*tipos.length;
    let done=0;
    for(const ent of(entities||[])){
      for(const t of tipos){
        const key=`${ent.id}_${t}`;
        if(habMap[key]){
          await db.upd("habilitaciones",{fecha_hasta:fecha,suspendida:false,motivo_suspension:null},[["id","eq",habMap[key]]]);
        } else {
          const payload={entity_type:tipo==="persona"?"persona":"vehiculo",tipo,proyecto_id:proyectoId,otorgado_por:currentUserId,fecha_hasta:fecha,suspendida:false};
          if(tipo==="persona")payload.persona_id=ent.id;else payload.vehiculo_id=ent.id;
          payload.tipo=t;
          await db.ins("habilitaciones",payload);
        }
        done++;
        if(done%20===0)setProg({done,total});
      }
    }
    setSaving(false);setProg(null);onSaved();onClose();
  };

  return <div className="mo"><div className="md" style={{maxWidth:400}}>
    <div className="mh"><div className="mt">⭐ Habilitar todo — {tipo==="persona"?"Personal":"Vehiculos"}</div><button className="mc" onClick={onClose}>x</button></div>
    <div className="mb">
      <div style={{color:"var(--tx2)",fontSize:13,marginBottom:16}}>
        Aplica <strong>todas</strong> las habilitaciones a {tipo==="persona"?"todas las personas":"todos los vehículos"} del sistema. Los que ya tienen habilitación actualiza la fecha; los que no la tienen la crea.
      </div>
      <div className="f"><label>Fecha de vencimiento</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></div>
      {prog&&<div style={{marginTop:12,fontSize:13,color:"var(--tx2)",textAlign:"center"}}>{prog.done} / {prog.total} habilitaciones...</div>}
      <button className="bp" style={{marginTop:8,background:"rgba(16,185,129,.2)",border:"2px solid var(--gr)",color:"var(--gr)"}} disabled={saving||!fecha} onClick={save}>
        {saving?"Procesando...":"Aplicar a todos"}
      </button>
    </div>
  </div></div>;
}

// ─── PERSONA DETALLE MODAL ───────────────────────────────────────────────────
function PersonaDetalleModal({persona,proyectoId,onClose}){

      else if(enP2>0&&enP3<=0)setUbicacion("camino");
      else setUbicacion("fuera");

        const vids=[...new Set((ses||[]).filter(s=>s.vehiculo_id).map(s=>s.vehiculo_id))];
        let vm={};
        if(vids.length){const{data:vehs}=await db.sel("vehiculos",{cols:"id,patente",inFilter:["id",vids]});(vehs||[]).forEach(v=>{vm[v.id]=v;});}
        sesiones=(ses||[]).map(s=>({...s,veh:vm[s.vehiculo_id]||null,tipo:"sesion"}));
      }
      const manuales=(mans||[]).map(m=>({id:m.id,cerrada_at:m.created_at,direccion:m.direccion,puesto:m.puesto,veh:null,tipo:"manual"}));
      // Combinar y ordenar por fecha
      const todo=[...sesiones,...manuales].sort((a,b)=>new Date(b.cerrada_at)-new Date(a.cerrada_at)).slice(0,30);
      setHistorial(todo);
      setLoading(false);
    };
    load();
  },[persona.id]);

  const ubColor=ubicacion==="chalet"?"#A78BFA":ubicacion==="camino"?"#60A5FA":"var(--tx2)";
  const ubLabel=ubicacion==="chalet"?"En Chalet":ubicacion==="camino"?"En Camino (P2→P3)":"Fuera de la obra";
  const ubIcon=ubicacion==="chalet"?"🏔️":ubicacion==="camino"?"🚗":"—";

  return <div className="mo"><div className="md">
    <div className="mh">
      <div>
        <div className="mt">{persona.nombre} {persona.apellido}</div>
        <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>{persona.empresa} · DNI {persona.dni}</div>
      </div>
      <button className="mc" onClick={onClose}>x</button>
    </div>
    <div className="mb">
      {loading?<div style={{textAlign:"center",padding:20,color:"var(--tx2)"}}>Cargando...</div>:<>
        {/* Ubicación actual */}
        <div style={{background:"var(--s2)",border:`1px solid ${ubColor}44`,borderRadius:8,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28}}>{ubIcon}</span>
          <div>
            <div style={{fontSize:11,color:"var(--tx2)",fontFamily:"var(--fm)",textTransform:"uppercase",marginBottom:2}}>Ubicación ahora</div>
            <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:700,color:ubColor}}>{ubLabel}</div>
          </div>
        </div>
        {/* Historial */}
        <div style={{fontSize:11,color:"var(--tx2)",fontFamily:"var(--fm)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Historial reciente</div>
        {historial.length===0
          ?<div style={{color:"var(--tx2)",textAlign:"center",padding:12}}>Sin registros.</div>
          :<div style={{maxHeight:280,overflowY:"auto"}}>
            {historial.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bd)"}}>
              <span className={`ld ld-${s.direccion==="entrada"?"in":"out"}`} style={{fontSize:11,flexShrink:0}}>{s.direccion}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500}}>{s.puesto}{s.veh?` · ${s.veh.patente}`:""}</div>
                <div style={{fontSize:11,color:"var(--tx2)"}}>{fmtTs(s.cerrada_at)}</div>
              </div>
            </div>)}
          </div>
        }
      </>}
    </div>
  </div></div>;
}

// ─── REGISTRO MANUAL DE ACCESO ───────────────────────────────────────────────
function RegistroManualAcceso({persona,user,proyectoId,onClose,onSaved}){
  const[dir,setDir]=useState(null);
  const[conVehiculo,setConVehiculo]=useState(null);
  const[patente,setPatente]=useState("");
  const[saving,setSaving]=useState(false);
  const[step,setStep]=useState("dir"); // dir | vehiculo | confirm
  const isP1=user.puesto_nombre==="Puesto 1";
  const labels=isP1?{entrada:"Ingreso a obra",salida:"Salio de obra"}:{entrada:"Subio al chalet",salida:"Bajo del chalet"};

  const guardar=async()=>{
    setSaving(true);
    // Si tiene vehículo, buscar o registrar el vehículo
    let vehiculoId=null;
    if(conVehiculo&&patente.trim()){
      const pat=patente.trim().toUpperCase();
      const{data:v}=await db.sel("vehiculos",{f:[["patente","eq",pat]],lim:1});
      if(v&&v[0]){
        vehiculoId=v[0].id;
      } else {
        // Auto-registrar vehículo
        const{data:nuevo}=await db.ins("vehiculos",{patente:pat,tipo:"Camioneta",descripcion:"Registrado via acceso manual",activo:true});
        if(nuevo&&nuevo[0])vehiculoId=nuevo[0].id;
      }
    }

    if(vehiculoId){
      // Registrar como sesión de acceso
      const{data:ses}=await db.ins("sesiones_acceso",{
        proyecto_id:proyectoId,puesto:user.puesto_nombre,operador_id:user.id,
        vehiculo_id:vehiculoId,vehiculo_ok:false,
        direccion:dir,total_personas:1,total_aprobados:1,total_rechazados:0,
      });
      if(ses&&ses[0]){
        await db.ins("registros_acceso",[{
          sesion_id:ses[0].id,persona_id:persona.id,
          dni_raw:persona.dni,resultado:"aprobado",orden_escaneo:1,
        }]);
      }
    } else {
      // Registrar como movimiento manual
      await db.ins("movimientos_manuales",{
        proyecto_id:proyectoId,puesto:user.puesto_nombre,operador_id:user.id,
        persona_id:persona.id,dni_raw:persona.dni,
        nombre_raw:`${persona.nombre} ${persona.apellido}`,direccion:dir,
      });
    }
    setSaving(false);onSaved&&onSaved();onClose();
  };

  return <div className="mo"><div className="md">
    <div className="mh">
      <div>
        <div className="mt">Registro manual de acceso</div>
        <div style={{fontSize:13,color:"var(--tx2)",marginTop:2}}>{persona.nombre} {persona.apellido} · DNI {persona.dni}</div>
      </div>
      <button className="mc" onClick={onClose}>x</button>
    </div>
    <div className="mb">
      {step==="dir"&&<>
        <div style={{fontSize:13,color:"var(--tx2)",marginBottom:14}}>¿Qué movimiento registrás?</div>
        <div className="dir-big">
          <button className="dir-big-btn in" onClick={()=>{setDir("entrada");setStep("vehiculo");}}>
            <div style={{fontSize:32,marginBottom:6}}>⬆️</div>
            {labels.entrada}
          </button>
          <button className="dir-big-btn out" onClick={()=>{setDir("salida");setStep("vehiculo");}}>
            <div style={{fontSize:32,marginBottom:6}}>⬇️</div>
            {labels.salida}
          </button>
        </div>
      </>}
      {step==="vehiculo"&&<>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <span className={`ld ld-${dir==="entrada"?"in":"out"}`}>{dir==="entrada"?labels.entrada:labels.salida}</span>
          <button onClick={()=>setStep("dir")} style={{background:"none",border:"none",color:"var(--tx2)",cursor:"pointer",fontSize:12}}>cambiar</button>
        </div>
        <div style={{fontSize:13,color:"var(--tx2)",marginBottom:14}}>¿Vino con vehículo?</div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={()=>setConVehiculo(true)} className={`db${conVehiculo===true?" db-in on":""}`} style={{flex:1}}>Sí</button>
          <button onClick={()=>{setConVehiculo(false);setPatente("");}} className={`db${conVehiculo===false?" db-out on":""}`} style={{flex:1}}>No</button>
        </div>
        {conVehiculo===true&&<div className="f">
          <label>Patente del vehículo</label>
          <input placeholder="Ej: AB123CD" value={patente} onChange={e=>setPatente(e.target.value.toUpperCase())} autoFocus/>
        </div>}
        {conVehiculo!==null&&<button className="bp" disabled={conVehiculo===true&&!patente.trim()||saving} onClick={guardar}>
          {saving?"Guardando...":"Confirmar registro"}
        </button>}
      </>}
    </div>
  </div></div>;
}

// ─── HABILITACION MASIVA VEHICULOS ───────────────────────────────────────────
function HabMasivaVehModal({proyectoId,currentUserId,habs,onClose,onSaved}){
  const[empresas,setEmpresas]=useState([]);
  const[empresa,setEmpresa]=useState("");
  const[vehiculos,setVehiculos]=useState([]);
  const[selected,setSelected]=useState({});
  const[tipo,setTipo]=useState("sh_ingreso");
  const[fecha,setFecha]=useState("");
  const[saving,setSaving]=useState(false);
  const[step,setStep]=useState("empresa");
  const tiposLabel={"sh_ingreso":"S&H Ingreso","sh_manejo":"S&H Subir a Chalet"};
  const selectedCount=Object.values(selected).filter(Boolean).length;

  useEffect(()=>{
    db.sel("vehiculos",{cols:"empresa",f:[["activo","eq",true]]}).then(({data})=>{
      if(data){const emp=[...new Set(data.map(v=>v.empresa).filter(Boolean))].sort();setEmpresas(emp);}
    });
  },[]);

  const loadVehiculos=async(emp)=>{
    const{data}=await db.sel("vehiculos",{f:[["empresa","eq",emp],["activo","eq",true]],ord:"patente.asc"});
    if(data){setVehiculos(data);const sel={};data.forEach(v=>{sel[v.id]=true;});setSelected(sel);}
  };
  const toggleAll=()=>{const allOn=vehiculos.every(v=>selected[v.id]);const sel={};vehiculos.forEach(v=>{sel[v.id]=!allOn;});setSelected(sel);};
  const save=async()=>{
    const ids=Object.entries(selected).filter(([_,v])=>v).map(([k])=>k);
    if(!ids.length||!fecha)return;
    setSaving(true);
    for(const vid of ids){
      const existing=getHab("vehiculo",vid,tipo,habs);
      if(existing)await db.upd("habilitaciones",{fecha_hasta:fecha,suspendida:false,motivo_suspension:null},[["id","eq",existing.id]]);
      else await db.ins("habilitaciones",{entity_type:"vehiculo",vehiculo_id:vid,tipo,proyecto_id:proyectoId,otorgado_por:currentUserId,fecha_desde:today(),fecha_hasta:fecha,suspendida:false});
    }
    setSaving(false);onSaved();onClose();
  };

  return <div className="mo"><div className="md md-lg">
    <div className="mh"><div className="mt">Hab. masiva vehiculos por empresa</div><button className="mc" onClick={onClose}>x</button></div>
    <div className="mb">
      {step==="empresa"&&<>
        <div className="f"><label>Tipo de habilitacion</label>
          <select value={tipo} onChange={e=>setTipo(e.target.value)}>
            {Object.entries(tiposLabel).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div className="f"><label>Empresa</label>
          <select value={empresa} onChange={e=>{setEmpresa(e.target.value);if(e.target.value)loadVehiculos(e.target.value);}}>
            <option value="">-- seleccionar empresa --</option>
            {empresas.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        {empresa&&vehiculos.length>0&&<button className="bp" onClick={()=>setStep("vehiculos")}>Ver vehiculos de {empresa}</button>}
      </>}
      {step==="vehiculos"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div><div style={{fontWeight:600}}>{empresa}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{tiposLabel[tipo]}</div></div>
          <button className="bsm" onClick={toggleAll}>{vehiculos.every(v=>selected[v.id])?"Quitar todos":"Seleccionar todos"}</button>
        </div>
        <div className="cbl">
          {vehiculos.map(v=>{
            const st=habSt(getHab("vehiculo",v.id,tipo,habs));
            return <div key={v.id} className="cbl-item" onClick={()=>setSelected(s=>({...s,[v.id]:!s[v.id]}))}>
              <input type="checkbox" checked={!!selected[v.id]} readOnly/>
              <span style={{fontSize:18}}>{VI[v.tipo]||"🚗"}</span>
              <div style={{flex:1}}><div style={{fontWeight:500,fontFamily:"var(--fm)"}}>{v.patente}</div><div style={{fontSize:11,color:"var(--tx2)"}}>{v.descripcion||v.tipo}</div></div>
              {st!=="none"&&<span className={`hc hc-${st}`} style={{fontSize:10}}>{st==="ok"?"actual":st==="exp"?"venc":"susp"}</span>}
            </div>;
          })}
        </div>
        <div style={{marginTop:12,fontSize:13,color:"var(--tx2)"}}>{selectedCount} vehiculos seleccionados</div>
        <div style={{marginTop:16}}><button className="bp" disabled={selectedCount===0} onClick={()=>setStep("fecha")}>Continuar → elegir fecha</button></div>
      </>}
      {step==="fecha"&&<>
        <div style={{marginBottom:14}}>
          <div style={{fontWeight:600}}>{empresa}</div>
          <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>{tiposLabel[tipo]} · {selectedCount} vehiculos</div>
        </div>
        <div className="f"><label>Fecha de vencimiento</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} autoFocus/></div>
      </>}
    </div>
    <div className="mf">
      {step==="vehiculos"&&<button className="bcanc" onClick={()=>setStep("empresa")}>Atras</button>}
      {step==="fecha"&&<button className="bcanc" onClick={()=>setStep("vehiculos")}>Atras</button>}
      <button className="bcanc" onClick={onClose}>Cancelar</button>
      {step==="fecha"&&<button className="bp" disabled={saving||!fecha} onClick={save}>{saving?"Aplicando...":"Aplicar a "+selectedCount+" vehiculos"}</button>}
    </div>
  </div></div>;
}

// ─── PERSONAL PANEL ───────────────────────────────────────────────────────────
function PersonalPanel({userRole,currentUserId,proyectoId,user}){
  const[personas,setPersonas]=useState([]);
  const[habs,setHabs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState("");
  const[filterEst,setFilterEst]=useState("");
  const[showModal,setShowModal]=useState(false);
  const[showMasivo,setShowMasivo]=useState(false);
  const[showMasivoTodo,setShowMasivoTodo]=useState(false);
  const[editP,setEditP]=useState(null);
  const[registroP,setRegistroP]=useState(null);
  const[detalleP,setDetalleP]=useState(null);
  const[habKey,setHabKey]=useState(0); // persona para registro manual
  const canSH=userRole==="sh"||userRole==="admin";
  const canCP=userRole==="cp"||userRole==="admin";
  const readOnly=userRole==="puesto"||userRole==="logistica";
  const onHabSaved=(newHab)=>{
    setHabs(prev=>{
      // Remove old hab for same entity+tipo+proyecto
      const filtered=prev.filter(h=>!(
        h.entity_type===newHab.entity_type&&
        h.persona_id===newHab.persona_id&&
        h.vehiculo_id===newHab.vehiculo_id&&
        h.tipo===newHab.tipo&&
        h.proyecto_id===newHab.proyecto_id
      ));
      return [...filtered, newHab];
    });
    setHabKey(k=>k+1);
  };
  const load=async()=>{
    setLoading(true);
    const[r1,r2]=await Promise.all([
      db.sel("personas",{f:[["deleted_at","is","null"]],ord:"apellido.asc",lim:5000}),
      db.sel("habilitaciones",{f:[["entity_type","eq","persona"]],lim:5000}),
    ]);
    if(r1.data)setPersonas(r1.data);
    if(r2.data)setHabs(r2.data);
    setHabKey(k=>k+1);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const saveP=async f=>{
    if(editP){await db.upd("personas",f,[["id","eq",editP.id]]);}
    else{
      // Check if exists but deleted
      const{data:exist}=await db.sel("personas",{f:[["dni","eq",f.dni]],lim:1});
      if(exist&&exist[0]&&exist[0].deleted_at){
        // Restore
        await db.upd("personas",{...f,deleted_at:null},[["id","eq",exist[0].id]]);
      } else {
        await db.ins("personas",f);
      }
    }
    load();
  };
  const delP=async id=>{if(!confirm("Eliminar?"))return;await db.upd("personas",{deleted_at:new Date().toISOString()},[["id","eq",id]]);load();};
  let filtered=personas.filter(p=>!filter||`${p.nombre} ${p.apellido} ${p.dni} ${p.empresa||""}`.toLowerCase().includes(filter.toLowerCase()));
  if(filterEst)filtered=filtered.filter(p=>personaEstado(p.id,habs)===filterEst);
  const btns=[];
  if(!readOnly&&(canSH||canCP))btns.push(<button key="add" className="badd" onClick={()=>{setEditP(null);setShowModal(true);}}>+ Nuevo</button>);
  if(canSH)btns.push(<button key="mas" className="badd" style={{background:"var(--acc2)",marginLeft:6}} onClick={()=>setShowMasivo(true)}>Hab. masiva por empresa</button>);
  if(userRole==="admin")btns.push(<button key="todo" className="badd" style={{background:"rgba(16,185,129,.2)",border:"1px solid var(--gr)",color:"var(--gr)",marginLeft:6}} onClick={()=>setShowMasivoTodo(true)}>⭐ Habilitar todo</button>);
  return <div>
    <div className="ph2"><div className="ptit"><span>Personal</span>{readOnly&&<span style={{fontSize:14,fontWeight:400,color:"var(--tx2)",marginLeft:10}}>solo lectura</span>}</div><div style={{display:"flex",gap:6}}>{btns}</div></div>
    <div className="sg">
      <div className="sc"><div className="sv">{personas.length}</div><div className="slb">Total</div></div>
      <div className="sc sc-btn" onClick={()=>setFilterEst(filterEst==="ok"?"":"ok")} style={filterEst==="ok"?{borderColor:"var(--gr)"}:{}}><div className="sv" style={{color:"var(--gr)"}}>{personas.filter(p=>personaEstado(p.id,habs)==="ok").length}</div><div className="slb">Habilitados</div></div>
      <div className="sc sc-btn" onClick={()=>setFilterEst(filterEst==="par"?"":"par")} style={filterEst==="par"?{borderColor:"var(--acc)"}:{}}><div className="sv" style={{color:"var(--acc)"}}>{personas.filter(p=>personaEstado(p.id,habs)==="par").length}</div><div className="slb">Parciales</div></div>
      <div className="sc sc-btn" onClick={()=>setFilterEst(filterEst==="no"?"":"no")} style={filterEst==="no"?{borderColor:"var(--rd)"}:{}}><div className="sv" style={{color:"var(--rd)"}}>{personas.filter(p=>personaEstado(p.id,habs)==="no").length}</div><div className="slb">Bloqueados</div></div>
    </div>
    <div className="fb">
      <input className="fi" placeholder="Buscar nombre, DNI o empresa..." value={filter} onChange={e=>setFilter(e.target.value)} style={{width:300}}/>
      {filterEst&&<button className="bsm" onClick={()=>setFilterEst("")}>x Filtro activo</button>}
    </div>
    {loading?<Spin/>:<div className="tw"><table>
      <thead>
        <tr>
          <th rowSpan={2} style={{verticalAlign:"bottom",borderRight:"1px solid var(--bd)",top:0}}>Persona</th>
          <th rowSpan={2} style={{verticalAlign:"bottom",top:0}}>DNI</th>
          <th rowSpan={2} style={{verticalAlign:"bottom",borderRight:"1px solid var(--bd)",top:0}}>Empresa</th>
          <th colSpan={3} className="sh-h" style={{textAlign:"center",paddingBottom:4,top:0}}>S&H</th>
          <th colSpan={3} className="cp-h" style={{textAlign:"center",paddingBottom:4,top:0}}>Control de Personal</th>
          <th rowSpan={2} style={{verticalAlign:"bottom",top:0}}>Estado</th>
          {!readOnly&&<th rowSpan={2} style={{top:0}}></th>}
        </tr>
        <tr>
          <th className="sh-h" style={{top:28}}>Ingreso</th><th style={{top:28}}>Subir a Chalet</th><th style={{top:28}}>Manejo en Monta&ntilde;a</th>
          <th className="cp-h" style={{top:28}}>Ingreso</th><th style={{top:28}}>Almuerzo</th><th style={{top:28}}>Cena</th>
        </tr>
      </thead>
      <tbody key={habKey}>
        {filtered.length===0&&<tr><td colSpan={readOnly?10:11} style={{textAlign:"center",color:"var(--tx2)",padding:28}}>Sin registros</td></tr>}
        {filtered.map(p=>{
          const est=personaEstado(p.id,habs);
          return <tr key={p.id}>
            <td style={{borderRight:"1px solid var(--bd)",cursor:"pointer"}} onClick={()=>setDetalleP(p)}><div style={{display:"flex",alignItems:"center",gap:8}}><div className="av">{ini(`${p.nombre} ${p.apellido}`)}</div><div><div style={{fontWeight:500}}>{p.nombre} {p.apellido}</div>{p.cargo&&<div style={{fontSize:11,color:"var(--tx2)"}}>{p.cargo}</div>}</div></div></td>
            <td className="mn">{p.dni}</td>
            <td style={{color:"var(--tx2)",fontSize:12,borderRight:"1px solid var(--bd)",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.empresa||"—"}</td>
            <HabCell hab={getHab("persona",p.id,"sh_ingreso",habs)} tipo="sh_ingreso" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canSH&&!readOnly} currentUserId={currentUserId} onRefresh={load} onHabSaved={onHabSaved} tdClass="sh-c"/>
            <HabCell hab={getHab("persona",p.id,"sh_chalet",habs)} tipo="sh_chalet" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canSH&&!readOnly} currentUserId={currentUserId} onRefresh={load}/>
            <HabCell hab={getHab("persona",p.id,"sh_manejo",habs)} tipo="sh_manejo" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canSH&&!readOnly} currentUserId={currentUserId} onRefresh={load}/>
            <HabCell hab={getHab("persona",p.id,"cp_ingreso",habs)} tipo="cp_ingreso" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canCP&&!readOnly} currentUserId={currentUserId} onRefresh={load} onHabSaved={onHabSaved} tdClass="cp-c"/>
            <HabCell hab={getHab("persona",p.id,"cp_almuerzo",habs)} tipo="cp_almuerzo" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canCP&&!readOnly} currentUserId={currentUserId} onRefresh={load}/>
            <HabCell hab={getHab("persona",p.id,"cp_cena",habs)} tipo="cp_cena" entityType="persona" entityId={p.id} proyectoId={proyectoId} canEdit={canCP&&!readOnly} currentUserId={currentUserId} onRefresh={load}/>
            <td>{est==="ok"?<span className="est-ok">ok</span>:est==="par"?<span className="est-par">parcial</span>:<span className="est-no">bloq.</span>}</td>
            {!readOnly&&<td><div style={{display:"flex",gap:5}}>
              {(canSH||canCP)&&<button className="bsm" onClick={()=>{setEditP(p);setShowModal(true);}}>Editar</button>}

              {userRole==="admin"&&<button className="bsm bsm-r" onClick={()=>delP(p.id)}>x</button>}
            </div></td>}

    {showMasivo&&<HabMasivaModal proyectoId={proyectoId} currentUserId={currentUserId} habs={habs} onClose={()=>setShowMasivo(false)} onSaved={load}/>}

function PersonModal({p,onClose,onSave}){

  const checkDni=async(dni)=>{
    if(!isNew||!dni||dni.length<6)return;
    // Only warn if active (not deleted) — deleted ones will be restored silently
    const{data}=await db.sel("personas",{f:[["dni","eq",dni],["deleted_at","is","null"]],lim:1});
    if(data&&data[0])setDniWarn(data[0]);
    else setDniWarn(null);

  return <div className="mo"><div className="md">

      </div>

  </div></div>;
}

function VehiculosPanel({userRole,currentUserId,proyectoId}){
  const[vehiculos,setVehiculos]=useState([]);
  const[habs,setHabs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showModal,setShowModal]=useState(false);
  const[editV,setEditV]=useState(null);
  const[showMasivoVeh,setShowMasivoVeh]=useState(false);
  const[showMasivoTodoVeh,setShowMasivoTodoVeh]=useState(false);

  const canEditVeh=canSH||userRole==="logistica";
  const readOnly=userRole==="puesto";
  const onHabSaved=(newHab)=>{
    setHabs(prev=>{
      // Remove old hab for same entity+tipo+proyecto
      const filtered=prev.filter(h=>!(
        h.entity_type===newHab.entity_type&&
        h.persona_id===newHab.persona_id&&
        h.vehiculo_id===newHab.vehiculo_id&&
        h.tipo===newHab.tipo&&
        h.proyecto_id===newHab.proyecto_id
      ));
      return [...filtered, newHab];
    });
    setHabKey(k=>k+1);
  };
  const load=async()=>{
    setLoading(true);
    const[r1,r2]=await Promise.all([
      db.sel("vehiculos",{f:[["activo","eq",true]],ord:"patente.asc"}),
      db.sel("habilitaciones",{f:[["entity_type","eq","vehiculo"]]}),
    ]);
    if(r1.data)setVehiculos(r1.data);
    if(r2.data)setHabs(r2.data);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const saveV=async f=>{
    if(editV){await db.upd("vehiculos",f,[["id","eq",editV.id]]);}
    else{
      // Check if exists but inactive
      const{data:exist}=await db.sel("vehiculos",{f:[["patente","eq",f.patente]],lim:1});
      if(exist&&exist[0]&&!exist[0].activo){
        await db.upd("vehiculos",{...f,activo:true},[["id","eq",exist[0].id]]);
      } else {
        await db.ins("vehiculos",f);
      }
    }
    load();
  };
  const delV=async id=>{if(!confirm("Eliminar?"))return;await db.upd("vehiculos",{activo:false},[["id","eq",id]]);load();};
  const filtered=vehiculos.filter(v=>!filter||`${v.patente} ${v.descripcion||""} ${v.empresa||""}`.toLowerCase().includes(filter.toLowerCase()));
  return <div>
    <div className="ph2">
      <div className="ptit"><span>Vehiculos</span>{readOnly&&<span style={{fontSize:14,fontWeight:400,color:"var(--tx2)",marginLeft:10}}>solo lectura</span>}</div>
      <div style={{display:"flex",gap:6}}>
        {canEditVeh&&<button className="badd" onClick={()=>{setEditV(null);setShowModal(true);}}>+ Nuevo</button>}
        {canSH&&<button className="badd" style={{background:"var(--acc2)"}} onClick={()=>setShowMasivoVeh(true)}>Hab. masiva por empresa</button>}
        {userRole==="admin"&&<button className="badd" style={{background:"rgba(16,185,129,.2)",border:"1px solid var(--gr)",color:"var(--gr)"}} onClick={()=>setShowMasivoTodoVeh(true)}>⭐ Habilitar todo</button>}
      </div>
    </div>
    <div className="sg">
      <div className="sc"><div className="sv">{filtered.length}</div><div className="slb">Total</div></div>
      <div className="sc"><div className="sv" style={{color:"var(--gr)"}}>{filtered.filter(v=>vehiculoEstado(v.id,habs)==="ok").length}</div><div className="slb">Habilitados</div></div>
      <div className="sc"><div className="sv" style={{color:"var(--rd)"}}>{filtered.filter(v=>vehiculoEstado(v.id,habs)==="no").length}</div><div className="slb">Bloqueados</div></div>
    </div>
    <div className="fb"><input className="fi" placeholder="Buscar patente o descripcion..." value={filter} onChange={e=>setFilter(e.target.value)} style={{width:280}}/></div>
    {loading?<Spin/>:<div className="tw"><table>
      <thead><tr><th>Patente</th><th>Tipo</th><th>Descripcion</th><th>Empresa</th><th>Cap.</th><th className="sh-h">S&H Ingreso</th><th className="sh-h" style={{borderLeft:"none"}}>Sub.Chalet</th><th>Estado</th>{!readOnly&&<th></th>}</tr></thead>
      <tbody>
        {filtered.length===0&&<tr><td colSpan={readOnly?8:9} style={{textAlign:"center",color:"var(--tx2)",padding:28}}>Sin vehiculos</td></tr>}
        {filtered.map(v=>{
          const est=vehiculoEstado(v.id,habs);
          return <tr key={v.id}>
            <td><span className="mn" style={{fontSize:15,fontWeight:600}}>{v.patente}</span></td>
            <td>{VI[v.tipo]||"🚗"} <span className="tag t-v" style={{fontSize:10}}>{v.tipo}</span></td>
            <td style={{color:"var(--tx2)"}}>{v.descripcion||"—"}</td>
            <td style={{color:"var(--tx2)",fontSize:12}}>{v.empresa||"—"}</td>
            <td style={{color:"var(--tx2)"}}>{v.capacidad?`${v.capacidad}p`:"—"}</td>
            <HabCell hab={getHab("vehiculo",v.id,"sh_ingreso",habs)} tipo="sh_ingreso" entityType="vehiculo" entityId={v.id} proyectoId={proyectoId} canEdit={canSH&&!readOnly} currentUserId={currentUserId} onRefresh={load} onHabSaved={onHabSaved} tdClass="sh-c"/>
            <HabCell hab={getHab("vehiculo",v.id,"sh_manejo",habs)} tipo="sh_manejo" entityType="vehiculo" entityId={v.id} proyectoId={proyectoId} canEdit={canSH&&!readOnly} currentUserId={currentUserId} onRefresh={load}/>
            <td>{est==="ok"?<span className="est-ok">ok</span>:<span className="est-no">bloq.</span>}</td>
            {!readOnly&&<td><div style={{display:"flex",gap:5}}>
              {canEditVeh&&<button className="bsm" onClick={()=>{setEditV(v);setShowModal(true);}}>Editar</button>}
              {userRole==="admin"&&<button className="bsm bsm-r" onClick={()=>delV(v.id)}>x</button>}
            </div></td>}
          </tr>;
        })}
      </tbody>
    </table></div>}
    {showModal&&<VehModal v={editV} onClose={()=>setShowModal(false)} onSave={saveV}/>}
    {showMasivoTodoVeh&&<HabTodoModal proyectoId={proyectoId} currentUserId={currentUserId} tipo="vehiculo" onClose={()=>setShowMasivoTodoVeh(false)} onSaved={load}/>}
    {showMasivoVeh&&<HabMasivaVehModal proyectoId={proyectoId} currentUserId={currentUserId} habs={habs} onClose={()=>setShowMasivoVeh(false)} onSaved={load}/>}
  </div>;
}

function SesionDetalle({ses,onClose}){
  const[regs,setRegs]=useState([]);
  const[pers,setPers]=useState([]);
  const[veh,setVeh]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const load=async()=>{
      const[{data:r},{data:v}]=await Promise.all([
        db.sel("registros_acceso",{f:[["sesion_id","eq",ses.id]],ord:"orden_escaneo.asc"}),
        ses.vehiculo_id?db.sel("vehiculos",{f:[["id","eq",ses.vehiculo_id]],lim:1}):{data:null},
      ]);
      if(r){
        setRegs(r);
        const ids=r.filter(x=>x.persona_id).map(x=>x.persona_id);
        if(ids.length){const{data:p}=await db.sel("personas",{cols:"id,nombre,apellido,empresa,dni"});setPers((p||[]).filter(x=>ids.includes(x.id)));}
      }
      if(v&&v[0])setVeh(v[0]);
      setLoading(false);
    };
    load();
  },[ses.id]);
  return <div className="mo"><div className="md md-lg">
    <div className="mh">
      <div><div className="mt">{veh?veh.patente:"Sesion"} — detalle</div><div style={{fontSize:12,color:"var(--tx2)",fontFamily:"var(--fm)",marginTop:2}}>{ses.puesto} · {fmtTs(ses.cerrada_at)} · <span className={`ld ld-${ses.direccion==="entrada"?"in":"out"}`}>{ses.direccion}</span></div></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button className="bsm" onClick={()=>{
          const dir=ses.direccion==="entrada"?"ENTRA":"SALE";
          const pat=veh?veh.patente:"SIN PATENTE";
          const desc=veh?` ${veh.descripcion||veh.tipo}`:"";
          const paxStr=pers.map(p=>`${p.nombre} ${p.apellido} ${p.empresa||""} DNI ${p.dni}`).join("; ");
          const txt=`${dir} — ${pat}${desc}${paxStr?` - ${paxStr}`:""}`;
          navigator.clipboard.writeText(txt).then(()=>{}).catch(()=>{
            const el=document.createElement("textarea");el.value=txt;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);
          });
        }} style={{fontSize:11,padding:"4px 10px"}}>Copiar</button>
        <button className="mc" onClick={onClose}>x</button>
      </div>
    </div>
    <div className="mb">
      {veh&&<div style={{marginBottom:14,padding:"10px 14px",background:"var(--s2)",borderRadius:4,display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:22}}>{VI[veh.tipo]||"🚗"}</span>
        <div><div style={{fontFamily:"var(--fm)",fontSize:16,fontWeight:600}}>{veh.patente}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{veh.descripcion} · {ses.vehiculo_ok?<span style={{color:"var(--gr)"}}>habilitado</span>:<span style={{color:"var(--rd)"}}>bloqueado</span>}</div></div>
      </div>}
      {loading?<Spin/>:regs.length===0?<div style={{color:"var(--tx2)",textAlign:"center",padding:20}}>Sin registros</div>
      :<div>{regs.map((r,i)=>{
        const p=pers.find(x=>x.id===r.persona_id);
        return <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--bd)"}}>
          <div style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--tx2)",width:24}}>#{i+1}</div>
          {p?<><div className="av">{ini(`${p.nombre} ${p.apellido}`)}</div><div style={{flex:1}}><div style={{fontWeight:500}}>{p.nombre} {p.apellido}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{p.empresa} · DNI {p.dni}</div></div></>:<><div className="av" style={{fontSize:14}}>?</div><div style={{flex:1,color:"var(--tx2)"}}>DNI: {r.dni_raw}</div></>}
          <span className={r.resultado==="aprobado"?"est-ok":"est-no"} style={{fontSize:11}}>{r.resultado==="aprobado"?"ok":"denegado"}</span>
        </div>;
      })}</div>}
    </div>
  </div></div>;
}

function Registros({defaultPuesto}){
  const[list,setList]=useState([]);
  const[manual,setManual]=useState([]);
  const[personas,setPersonas]=useState({}); // id -> persona
  const[vehiculos,setVehiculos]=useState({}); // id -> vehiculo
  const[regsMap,setRegsMap]=useState({}); // sesion_id -> [regs]
  const[loading,setLoading]=useState(true);
  const[fp,setFp]=useState(defaultPuesto||"");
  const[fd,setFd]=useState("");
  const[fFecha,setFFecha]=useState(today());
  const[fTipo,setFTipo]=useState("");
  const[search,setSearch]=useState("");
  const[detalle,setDetalle]=useState(null);

  const onHabSaved=(newHab)=>{
    setHabs(prev=>{
      // Remove old hab for same entity+tipo+proyecto
      const filtered=prev.filter(h=>!(
        h.entity_type===newHab.entity_type&&
        h.persona_id===newHab.persona_id&&
        h.vehiculo_id===newHab.vehiculo_id&&
        h.tipo===newHab.tipo&&
        h.proyecto_id===newHab.proyecto_id
      ));
      return [...filtered, newHab];
    });
    setHabKey(k=>k+1);
  };
  const load=async()=>{
    setLoading(true);
    const sf=[...(fp?[["puesto","eq",fp]]:[])];
    if(fFecha){sf.push(["cerrada_at","gte",fFecha+"T00:00:00"]);sf.push(["cerrada_at","lte",fFecha+"T23:59:59"]);}
    const mf=[...(fp?[["puesto","eq",fp]]:[])];
    if(fFecha){mf.push(["created_at","gte",fFecha+"T00:00:00"]);mf.push(["created_at","lte",fFecha+"T23:59:59"]);}
    const[{data:ses},{data:man}]=await Promise.all([
      db.sel("sesiones_acceso",{f:sf,ord:"cerrada_at.desc",lim:200}),
      db.sel("movimientos_manuales",{f:mf,ord:"created_at.desc",lim:200}),
    ]);
    const sesData=ses||[];const manData=man||[];
    setList(sesData);setManual(manData);
    // Load vehicle patentes
    const vids=[...new Set(sesData.filter(s=>s.vehiculo_id).map(s=>s.vehiculo_id))];
    if(vids.length){
      const{data:vehs}=await db.sel("vehiculos",{cols:"id,patente,descripcion,tipo"});
      const vm={};(vehs||[]).forEach(v=>{vm[v.id]=v;});setVehiculos(vm);
    }
    // Load registros_acceso for all sessions
    if(sesData.length){
      const sesIds=sesData.map(s=>s.id);
      const{data:regs}=await db.sel("registros_acceso",{cols:"sesion_id,persona_id,dni_raw,resultado,orden_escaneo",inFilter:["sesion_id",sesIds]});
      const rm={};
      (regs||[]).forEach(r=>{if(!rm[r.sesion_id])rm[r.sesion_id]=[];rm[r.sesion_id].push(r);});
      setRegsMap(rm);
      // Load personas for names
      const pids=[...new Set((regs||[]).filter(r=>r.persona_id).map(r=>r.persona_id))];
      if(pids.length){
        const{data:pers}=await db.sel("personas",{cols:"id,nombre,apellido"});
        const pm={};(pers||[]).forEach(p=>{pm[p.id]=p;});setPersonas(pm);
      }
    }
    setLoading(false);
  };
  useEffect(()=>{load();const i=setInterval(load,30000);return()=>clearInterval(i);},[fp,fFecha]);

  const sesFiltered=list.filter(s=>(!fd||s.direccion===fd)&&(!search||(vehiculos[s.vehiculo_id]?.patente||"").toLowerCase().includes(search.toLowerCase())||(regsMap[s.id]||[]).some(r=>personas[r.persona_id]&&(`${personas[r.persona_id].nombre} ${personas[r.persona_id].apellido}`).toLowerCase().includes(search.toLowerCase()))));
  const manFiltered=manual.filter(m=>(!fd||m.direccion===fd)&&(!search||m.nombre_raw?.toLowerCase().includes(search.toLowerCase())||m.dni_raw?.includes(search)));
  const showSes=fTipo===""||fTipo==="vehiculo";
  const showMan=fTipo===""||fTipo==="manual";

  const getPaxLabel=(sesId)=>{
    const regs=(regsMap[sesId]||[]).filter(r=>r.resultado==="aprobado");
    if(!regs.length)return"sin pasajeros";
    const names=regs.map(r=>{const p=personas[r.persona_id];return p?`${p.nombre} ${p.apellido}`:r.dni_raw;});
    const max=2;
    if(names.length<=max)return names.join(", ");
    return names.slice(0,max).join(", ")+" y "+( names.length-max)+" mas";
  };

  return <div>
    <div className="ph2"><div className="ptit">Registros de <span>Acceso</span></div></div>
    <div className="sg">
      <div className="sc"><div className="sv">{list.filter(s=>s.cerrada_at&&s.cerrada_at.startsWith(today())).length}</div><div className="slb">Sesiones hoy</div></div>
      <div className="sc"><div className="sv">{list.length}</div><div className="slb">Total</div></div>
      <div className="sc"><div className="sv">{manual.length}</div><div className="slb">Manuales</div></div>
      <div className="sc"><div className="sv" style={{color:"var(--rd)"}}>{list.reduce((a,s)=>a+(s.total_rechazados||0),0)}</div><div className="slb">Denegados</div></div>
    </div>
    <div className="fb" style={{flexWrap:"wrap",gap:8}}>
      <input className="fi" placeholder="Buscar patente o persona..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:220}}/>
      <input className="fi" type="date" value={fFecha} onChange={e=>setFFecha(e.target.value)}/>
      <select className="fi" value={fp} onChange={e=>setFp(e.target.value)}><option value="">Todos los puestos</option><option>Puesto 1</option><option>Puesto 2</option><option>Puesto 3</option></select>
      <select className="fi" value={fd} onChange={e=>setFd(e.target.value)}><option value="">Entrada y salida</option><option value="entrada">Entrada</option><option value="salida">Salida</option></select>
      <select className="fi" value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="">Todo</option><option value="vehiculo">Con vehiculo</option><option value="manual">Manuales</option></select>
    </div>
    {loading?<Spin/>:<>
      {showSes&&sesFiltered.length>0&&<>
        <div style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--tx2)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>Ingresos con vehiculo — {sesFiltered.length}</div>
        <div className="tw" style={{marginBottom:16}}><table>

const F={V:"v",P:"p",C:"c",D:"d"};
function RecentSessions({puesto,onSelectSesion}){
  const[list,setList]=useState([]);
  const[personas,setPersonas]=useState({});
  const[vehiculos,setVehiculos]=useState({});
  const[regsMap,setRegsMap]=useState({});

  useEffect(()=>{
    const load=async()=>{
      const{data:ses}=await db.sel("sesiones_acceso",{f:[["puesto","eq",puesto],["cerrada_at","gte",today()+"T00:00:00"]],ord:"cerrada_at.desc",lim:6});
      if(!ses||!ses.length)return;
      setList(ses);
      const vids=[...new Set(ses.filter(s=>s.vehiculo_id).map(s=>s.vehiculo_id))];
      const sesIds=ses.map(s=>s.id);
      const[{data:vehs},{data:regs}]=await Promise.all([
        vids.length?db.sel("vehiculos",{cols:"id,patente,descripcion,tipo"}):{data:[]},
        db.sel("registros_acceso",{cols:"sesion_id,persona_id,dni_raw,resultado",inFilter:["sesion_id",sesIds]}),
      ]);
      const vm={};(vehs||[]).forEach(v=>{vm[v.id]=v;});setVehiculos(vm);
      const rm={};
      (regs||[]).filter(r=>sesIds.includes(r.sesion_id)).forEach(r=>{if(!rm[r.sesion_id])rm[r.sesion_id]=[];rm[r.sesion_id].push(r);});
      setRegsMap(rm);
      const pids=[...new Set((regs||[]).filter(r=>r.persona_id).map(r=>r.persona_id))];
      if(pids.length){const{data:pers}=await db.sel("personas",{cols:"id,nombre,apellido"});const pm={};(pers||[]).forEach(p=>{pm[p.id]=p;});setPersonas(pm);}
    };
    load();
  },[puesto]);

  if(!list.length)return null;

  const getPaxStr=(sesId)=>{
    const ok=(regsMap[sesId]||[]).filter(r=>r.resultado==="aprobado");
    if(!ok.length)return"sin pasajeros";
    const names=ok.map(r=>{const p=personas[r.persona_id];return p?`${p.nombre} ${p.apellido}`:r.dni_raw;});
    if(names.length<=2)return names.join(", ");
    return names.slice(0,2).join(", ")+" y "+(names.length-2)+" mas...";
  };

  return <>
    <div className="rt">Ultimos movimientos del dia en este puesto</div>
    {list.map(s=>{
      const veh=vehiculos[s.vehiculo_id];
      return <div key={s.id} className="sr" onClick={()=>onSelectSesion(s)}>
        <span className={`ld ld-${s.direccion==="entrada"?"in":"out"}`}>{s.direccion}</span>
        <div style={{flex:1,minWidth:0}}>
          <span style={{fontFamily:"var(--fm)",fontWeight:600,fontSize:13}}>{veh?veh.patente:"—"}</span>
          <span style={{color:"var(--tx2)",fontSize:12,marginLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getPaxStr(s.id)}</span>
        </div>
        <span style={{color:"var(--tx2)",fontSize:11,fontFamily:"var(--fm)",flexShrink:0}}>{fmtTs(s.cerrada_at)}</span>
      </div>;
    })}
  </>;
}

const OFFLINE_KEY="controlobra_offline";
// Usa sessionStorage con fallback a variable en memoria
let _offlineMem=[];
const offlineStore={
  get:()=>{
    try{const s=localStorage.getItem(OFFLINE_KEY);return s?JSON.parse(s):_offlineMem;}
    catch(e){return _offlineMem;}
  },
  add:(rec)=>{
    const l=offlineStore.get();l.push(rec);_offlineMem=l;
    try{localStorage.setItem(OFFLINE_KEY,JSON.stringify(l));}catch(e){}
  },
  clear:()=>{_offlineMem=[];try{localStorage.removeItem(OFFLINE_KEY);}catch(e){}},
};
